<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Footnotes to Plato — passage view</title>
<style>
  /* ---- design tokens -------------------------------------------------------
     Subject: a scholarly instrument for ancient-philosophy researchers. The
     "world" is the printed critical edition — Stephanus/Bekker margin numbers
     running down a column of text. Palette: calm light-blue drifting to
     lavender (handoff); saturated colour RESERVED for the heat ramp and the
     uncertainty shading, so strong colour only ever means information.        */
  :root{
    --paper:#f7f8fb;          /* cool near-white, like laid text-paper        */
    --ink:#1c2230;            /* dark slate ink                                */
    --ink-soft:#5b6478;       /* secondary text                               */
    --rule:#d7dced;           /* hairline blue-grey                            */
    --lav:#8b86c9;            /* lavender — structural accent                  */
    --lav-deep:#5a5497;       /* deeper lavender for emphasis                  */
    /* heat ramp: pale blue -> lavender -> deep indigo (the ONLY strong colour)*/
    --h0:#eef1fa; --h1:#cfd8f4; --h2:#a7b3ea; --h3:#8388d6;
    --h4:#6a5fbf; --h5:#4e3f9c; --h6:#3a2a7d;
    --uncertain:#b06a3a;      /* warm clay — ONLY for the uncertainty apparatus*/
    --uncertain-soft:#e7d3c4;
    --shadow:0 1px 2px rgba(28,34,48,.06),0 4px 16px rgba(28,34,48,.06);
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Georgia,serif;
    --sans:"Inter","Helvetica Neue",Arial,system-ui,sans-serif;
    --mono:"SF Mono",ui-monospace,"Cascadia Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--paper); color:var(--ink);
    font-family:var(--sans); line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1060px; margin:0 auto; padding:32px 28px 96px}

  /* ---- masthead ----------------------------------------------------------- */
  header.mast{border-bottom:2px solid var(--ink); padding-bottom:14px; margin-bottom:8px}
  .mast h1{
    font-family:var(--serif); font-weight:600; font-size:34px; letter-spacing:.01em;
    margin:0 0 2px;
  }
  .mast .sub{font-family:var(--serif); font-style:italic; color:var(--ink-soft); font-size:17px}
  .mast .kicker{
    font-family:var(--mono); font-size:11px; letter-spacing:.18em; text-transform:uppercase;
    color:var(--lav-deep); margin-bottom:6px;
  }

  /* ---- controls ----------------------------------------------------------- */
  .controls{
    display:flex; flex-wrap:wrap; gap:18px 26px; align-items:flex-end;
    padding:18px 0 20px; border-bottom:1px solid var(--rule); margin-bottom:8px;
  }
  .ctl{display:flex; flex-direction:column; gap:5px}
  .ctl label{
    font-family:var(--mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--ink-soft);
  }
  select, .seg button{
    font-family:var(--sans); font-size:14px; color:var(--ink);
    background:#fff; border:1px solid var(--rule); border-radius:7px;
    padding:7px 11px; cursor:pointer;
  }
  select{min-width:230px; box-shadow:var(--shadow)}
  .seg{display:inline-flex; border:1px solid var(--rule); border-radius:7px; overflow:hidden; box-shadow:var(--shadow)}
  .seg button{border:0; border-radius:0; background:#fff; padding:7px 13px}
  .seg button + button{border-left:1px solid var(--rule)}
  .seg button[aria-pressed="true"]{background:var(--lav); color:#fff}

  /* ---- tier banner -------------------------------------------------------- */
  .tier{
    display:flex; gap:12px; align-items:flex-start;
    border-radius:9px; padding:12px 15px; margin:18px 0 10px; font-size:13.5px;
  }
  .tier .dot{width:10px; height:10px; border-radius:50%; margin-top:5px; flex:none}
  .tier.trustworthy{background:#eef1fa; border:1px solid var(--rule)}
  .tier.trustworthy .dot{background:var(--h4)}
  .tier.uncertain{background:#faf1ea; border:1px solid var(--uncertain-soft)}
  .tier.uncertain .dot{background:var(--uncertain)}
  .tier b{font-weight:600}
  .tier .label{
    font-family:var(--mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase;
  }
  .tier.trustworthy .label{color:var(--lav-deep)}
  .tier.uncertain .label{color:var(--uncertain)}

  /* ---- profile ------------------------------------------------------------ */
  .profile-head{display:flex; justify-content:space-between; align-items:baseline; margin:22px 0 4px}
  .profile-head h2{font-family:var(--serif); font-weight:600; font-size:22px; margin:0}
  .profile-head .meta{font-size:13px; color:var(--ink-soft)}
  .legend{display:flex; align-items:center; gap:10px; font-size:12px; color:var(--ink-soft); margin:10px 0 2px}
  .ramp{display:flex; height:11px; width:150px; border-radius:3px; overflow:hidden; border:1px solid var(--rule)}
  .ramp i{flex:1}

  .book{margin:22px 0 6px}
  .book-label{
    font-family:var(--serif); font-size:15px; color:var(--lav-deep); font-weight:600;
    display:flex; align-items:center; gap:8px; margin-bottom:7px;
  }
  .book-label .common{
    font-family:var(--mono); font-size:9.5px; letter-spacing:.1em; color:var(--uncertain);
    border:1px solid var(--uncertain-soft); border-radius:4px; padding:1px 5px; text-transform:uppercase;
  }
  /* the heat strip: pages read left-to-right; within a page, a–e sections
     stack as a small column — like margin numbers running down an edition.   */
  .strip{display:flex; flex-wrap:wrap; gap:10px 7px; align-items:flex-start}
  .pgcol{display:flex; flex-direction:column; align-items:center; gap:2px}
  .pgcol .sections{display:flex; flex-direction:column; gap:2px}
  .cell{
    position:relative; width:22px; height:16px; border-radius:2px; cursor:pointer;
    border:1px solid rgba(28,34,48,.06); transition:transform .08s, box-shadow .08s;
    display:flex; align-items:center; justify-content:center;
  }
  .cell:hover{transform:scale(1.18); box-shadow:var(--shadow); outline:2px solid var(--lav); z-index:2}
  .cell .sec{
    font-family:var(--mono); font-size:8px; color:rgba(28,34,48,.28);
    pointer-events:none; user-select:none;
  }
  .cell.hot .sec{color:rgba(255,255,255,.7)}
  .cell.empty{background:transparent!important; border-style:dashed; border-color:rgba(28,34,48,.08); cursor:default}
  .cell.empty:hover{transform:none; outline:none; box-shadow:none}
  .pgcol .pnum{
    font-family:var(--mono); font-size:9px; color:var(--ink-soft);
    letter-spacing:.02em; margin-top:1px; writing-mode:horizontal-tb;
  }
  /* every 5th page gets a heavier tick, like a ruled edition */
  .pgcol.mark .pnum{color:var(--lav-deep); font-weight:600}

  /* ---- drill-in panel ----------------------------------------------------- */
  .drill{
    position:fixed; top:0; right:0; height:100vh; width:min(430px,92vw);
    background:#fff; border-left:1px solid var(--rule); box-shadow:-8px 0 30px rgba(28,34,48,.12);
    transform:translateX(100%); transition:transform .22s cubic-bezier(.4,0,.2,1);
    display:flex; flex-direction:column; z-index:20;
  }
  .drill.open{transform:translateX(0)}
  .drill-head{padding:20px 22px 14px; border-bottom:1px solid var(--rule)}
  .drill-head .loc{font-family:var(--serif); font-size:21px; font-weight:600}
  .drill-head .cnt{font-size:13px; color:var(--ink-soft); margin-top:2px}
  .drill-close{position:absolute; top:16px; right:18px; border:0; background:none; font-size:22px; cursor:pointer; color:var(--ink-soft); line-height:1}
  .drill-body{overflow-y:auto; padding:8px 0}
  .cite{padding:12px 22px; border-bottom:1px solid var(--rule); font-size:13.5px}
  .cite .t{font-family:var(--serif); color:var(--ink); line-height:1.35}
  .cite .a{color:var(--ink-soft); margin-top:3px}
  .cite .j{color:var(--lav-deep); font-size:12.5px; margin-top:3px}
  .cite a.doi{
    font-family:var(--mono); font-size:11.5px; color:var(--lav-deep);
    text-decoration:none; border-bottom:1px solid var(--rule);
  }
  .cite a.doi:hover{border-color:var(--lav)}
  .drill-foot{padding:14px 22px; border-top:1px solid var(--rule)}
  .btn{
    font-family:var(--sans); font-size:13.5px; font-weight:500; color:#fff;
    background:var(--lav-deep); border:0; border-radius:7px; padding:9px 15px; cursor:pointer; width:100%;
  }
  .btn:hover{background:var(--lav)}
  .scrim{position:fixed; inset:0; background:rgba(28,34,48,.18); opacity:0; pointer-events:none; transition:opacity .22s; z-index:15}
  .scrim.open{opacity:1; pointer-events:auto}

  .tooltip{
    position:fixed; z-index:30; pointer-events:none; background:var(--ink); color:#fff;
    font-size:12px; padding:6px 9px; border-radius:6px; opacity:0; transition:opacity .1s;
    font-family:var(--sans); white-space:nowrap;
  }
  .tooltip .tt-loc{font-family:var(--mono); font-size:11px; color:#c7cdf0}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header class="mast">
    <div class="kicker">Footnotes to Plato</div>
    <h1>Passage-level attention</h1>
    <div class="sub">Which passages of a work the scholarship actually cites</div>
  </header>

  <div class="controls">
    <div class="ctl">
      <label for="work">Work</label>
      <select id="work"></select>
    </div>
    <div class="ctl">
      <label>Journals</label>
      <div class="seg" id="pool">
        <button data-mode="pooled" aria-pressed="true">Pooled</button>
        <button data-mode="split" aria-pressed="false">By journal</button>
      </div>
    </div>
    <div class="ctl">
      <label>Intensity</label>
      <div class="seg" id="metric">
        <button data-metric="count" aria-pressed="true">Citations</button>
        <button data-metric="articles" aria-pressed="false">Distinct articles</button>
      </div>
    </div>
  </div>

  <div id="tier"></div>

  <div class="profile-head">
    <h2 id="workname"></h2>
    <div class="meta" id="workmeta"></div>
  </div>
  <div class="legend">
    <span>fewer</span>
    <div class="ramp"><i style="background:var(--h0)"></i><i style="background:var(--h1)"></i><i style="background:var(--h2)"></i><i style="background:var(--h3)"></i><i style="background:var(--h4)"></i><i style="background:var(--h5)"></i><i style="background:var(--h6)"></i></div>
    <span>more citations per section</span>
  </div>

  <div id="profile"></div>
</div>

<div class="scrim" id="scrim"></div>
<aside class="drill" id="drill">
  <div class="drill-head">
    <button class="drill-close" id="drillClose">×</button>
    <div class="loc" id="drillLoc"></div>
    <div class="cnt" id="drillCnt"></div>
  </div>
  <div class="drill-body" id="drillBody"></div>
  <div class="drill-foot">
    <button class="btn" id="exportBtn">Export these citations (.csv)</button>
  </div>
</aside>

<div class="tooltip" id="tooltip"></div>

<script>
// ---- data files present in this standalone build --------------------------
const FILES = {
  "Nicomachean_Ethics": "Nicomachean_Ethics.json",
  "Meno": "Meno.json"
};
// textual book order (common books sit in their NE place; string sort won't do)
const BOOK_ORDER = ["I","II","III","IV","V*","VI*","VII*","VIII","IX","X",
                    "Α","α","Β","Γ","Δ","Ε","Ζ","Η","Θ","Ι","Κ","Λ","Μ","Ν",
                    "XI","XII"];
const SECTIONS = ["a","b","c","d","e"];

let current = null;       // loaded work json
let mode = "pooled";      // pooled | split
let metric = "count";     // count | articles
let activeJournals = null;// null = all (pooled uses all; split shows per-journal)

const $ = s => document.querySelector(s);

function stripTags(s){ return (s||"").replace(/<[^>]+>/g," ").replace(/\s+/g," ").trim(); }

// heat ramp: map a value in [0,max] to one of 7 buckets
const RAMP = ["--h0","--h1","--h2","--h3","--h4","--h5","--h6"];
function heatVar(v, max){
  if(v<=0) return "--h0";
  // perceptual-ish: sqrt so mid values aren't all washed out
  const t = Math.sqrt(v)/Math.sqrt(max);
  const i = Math.min(RAMP.length-1, Math.max(1, Math.round(t*(RAMP.length-1))));
  return RAMP[i];
}
function isHot(v,max){ return v>0 && Math.sqrt(v)/Math.sqrt(max) > 0.55; }

async function loadWork(id){
  const res = await fetch(FILES[id]);
  current = await res.json();
  activeJournals = null;
  render();
}

function cellValue(cell){
  if(mode==="split" && activeJournals){
    // sum only selected journals
    let s=0; for(const j of activeJournals) s += (cell.by_journal[j]||0); return s;
  }
  return metric==="articles" ? cell.articles : cell.count;
}

function render(){
  renderTier();
  renderHead();
  renderProfile();
}

function renderTier(){
  const t = current.tier;
  const el = $("#tier");
  if(t==="trustworthy"){
    el.className = "tier trustworthy";
    el.innerHTML = `<span class="dot"></span><div>
      <div class="label">Trustworthy tier · publication grade</div>
      At least 80% of this work's detected citations resolve to a specific passage.
      The profile below is a reliable picture of where attention falls: you can
      compare section heights within this work and cite them with confidence.</div>`;
  } else {
    el.className = "tier uncertain";
    el.innerHTML = `<span class="dot"></span><div>
      <div class="label">Uncertain tier · read with care</div>
      Fewer than 80% of this work's detected citations could be pinned to a
      specific passage — its page-numbers collide with other works, so much of
      its citation traffic is unplaceable. <b>What you see is a floor, not the
      full picture.</b> A short bar here means "we couldn't place these," not
      "few cite this." Trust the <i>shape</i> of what resolved; don't read the
      absolute heights as complete, and don't compare heights against
      trustworthy-tier works.</div>`;
  }
}

function renderHead(){
  const name = current.work.replace(/_/g," ");
  $("#workname").textContent = name;
  const cells = current.cells;
  const totalCites = cells.reduce((a,c)=>a+c.count,0);
  const pages = new Set(cells.map(c=>c.page)).size;
  $("#workmeta").textContent =
    `${totalCites.toLocaleString()} placed citations · ${cells.length} sections · ${pages} pages`
    + (current.faceted ? " · book-faceted" : "");
}

function orderedBooks(){
  const present = [...new Set(current.cells.map(c=>c.book))];
  return present.sort((a,b)=>{
    const ia=BOOK_ORDER.indexOf(a), ib=BOOK_ORDER.indexOf(b);
    return (ia<0?999:ia)-(ib<0?999:ib);
  });
}

function renderProfile(){
  const host = $("#profile");
  host.innerHTML = "";
  // global max for a stable colour scale across the whole work
  let max = 0;
  for(const c of current.cells){ const v=cellValue(c); if(v>max) max=v; }
  max = Math.max(max,1);

  const books = orderedBooks();
  for(const book of books){
    const cells = current.cells
      .filter(c=>c.book===book)
      .sort((a,b)=> a.page-b.page || SECTIONS.indexOf(a.section)-SECTIONS.indexOf(b.section));
    if(!cells.length) continue;

    const wrap = document.createElement("div");
    wrap.className = "book";
    if(current.faceted && book){
      const common = book.endsWith("*");
      wrap.innerHTML = `<div class="book-label">Book ${book.replace("*","")}
        ${common?'<span class="common">common book</span>':''}</div>`;
    }
    const strip = document.createElement("div");
    strip.className = "strip";

    // group this book's cells by page, so each page is a small a–e column
    const byPage = new Map();
    for(const c of cells){
      if(!byPage.has(c.page)) byPage.set(c.page, {});
      byPage.get(c.page)[c.section] = c;
    }
    const pages = [...byPage.keys()].sort((a,b)=>a-b);

    for(const page of pages){
      const secmap = byPage.get(page);
      const col = document.createElement("div");
      col.className = "pgcol" + (page%5===0 ? " mark":"");
      const stack = document.createElement("div");
      stack.className = "sections";
      for(const s of SECTIONS){
        const c = secmap[s];
        if(c){
          const v = cellValue(c);
          const cell = document.createElement("div");
          cell.className = "cell" + (isHot(v,max)?" hot":"");
          cell.style.background = `var(${heatVar(v,max)})`;
          cell.innerHTML = `<span class="sec">${s}</span>`;
          cell.addEventListener("click", ()=>openDrill(c));
          cell.addEventListener("mousemove", e=>showTip(e,c,v));
          cell.addEventListener("mouseleave", hideTip);
          stack.appendChild(cell);
        } else {
          // absent section: a faint placeholder keeps the a–e grid aligned
          const gap = document.createElement("div");
          gap.className = "cell empty";
          stack.appendChild(gap);
        }
      }
      col.appendChild(stack);
      const pnum = document.createElement("div");
      pnum.className = "pnum";
      pnum.textContent = page;
      col.appendChild(pnum);
      strip.appendChild(col);
    }
    wrap.appendChild(strip);
    host.appendChild(wrap);
  }
}

// ---- tooltip --------------------------------------------------------------
const tip = $("#tooltip");
function showTip(e,c,v){
  const unit = metric==="articles" ? "articles" : "citations";
  tip.innerHTML = `<span class="tt-loc">${c.page}${c.section}</span> · ${v} ${unit}`
    + ` · ${c.articles} distinct`;
  tip.style.opacity="1";
  tip.style.left=(e.clientX+12)+"px";
  tip.style.top=(e.clientY+12)+"px";
}
function hideTip(){ tip.style.opacity="0"; }

// ---- drill-in -------------------------------------------------------------
function openDrill(cell){
  const loc = `${current.work.replace(/_/g," ")} ${cell.page}${cell.section}`;
  $("#drillLoc").textContent = loc.replace(/\s(\d)/, " · $1");
  // dots at this exact (book,page,section), deduped already by builder
  const dots = current.dots.filter(d =>
    d.page===cell.page && d.section===cell.section && d.book===cell.book);
  $("#drillCnt").textContent =
    `${dots.length} article${dots.length===1?"":"s"} cite this section`;
  const body = $("#drillBody");
  body.innerHTML = "";
  // newest first
  dots.sort((a,b)=> (b.year||"").localeCompare(a.year||""));
  for(const d of dots){
    const el = document.createElement("div");
    el.className = "cite";
    const doi = d.doi ? `https://doi.org/${d.doi}` : null;
    el.innerHTML =
      `<div class="t">${stripTags(d.title)||"(untitled)"}</div>`+
      (d.author?`<div class="a">${stripTags(d.author)}</div>`:"")+
      `<div class="j">${d.journal||""} · ${d.year||""}`+
      (doi?` · <a class="doi" href="${doi}" target="_blank" rel="noopener">${d.doi}</a>`:"")+
      `</div>`;
    body.appendChild(el);
  }
  currentDrillDots = dots;
  currentDrillLoc = loc;
  $("#drill").classList.add("open");
  $("#scrim").classList.add("open");
}
let currentDrillDots=[], currentDrillLoc="";
function closeDrill(){ $("#drill").classList.remove("open"); $("#scrim").classList.remove("open"); }

// ---- export ---------------------------------------------------------------
function exportCsv(){
  const rows = [["work","locus","journal","year","author","title","doi"]];
  for(const d of currentDrillDots){
    rows.push([
      current.work, `${d.page}${d.section}`, d.journal||"", d.year||"",
      stripTags(d.author), stripTags(d.title),
      d.doi?`https://doi.org/${d.doi}`:""
    ]);
  }
  const csv = rows.map(r=>r.map(x=>{
    const s=String(x); return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;
  }).join(",")).join("\n");
  const blob = new Blob([csv],{type:"text/csv"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `${current.work}_${currentDrillLoc.replace(/[^\w]/g,"")}.csv`;
  a.click();
}

// ---- wire up --------------------------------------------------------------
function initControls(){
  const sel = $("#work");
  for(const id of Object.keys(FILES)){
    const o=document.createElement("option");
    o.value=id; o.textContent=id.replace(/_/g," "); sel.appendChild(o);
  }
  sel.addEventListener("change", e=>loadWork(e.target.value));
  $("#pool").addEventListener("click", e=>{
    if(!e.target.dataset.mode) return;
    mode=e.target.dataset.mode;
    for(const b of $("#pool").children) b.setAttribute("aria-pressed", b.dataset.mode===mode);
    render();
  });
  $("#metric").addEventListener("click", e=>{
    if(!e.target.dataset.metric) return;
    metric=e.target.dataset.metric;
    for(const b of $("#metric").children) b.setAttribute("aria-pressed", b.dataset.metric===metric);
    render();
  });
  $("#drillClose").addEventListener("click", closeDrill);
  $("#scrim").addEventListener("click", closeDrill);
  $("#exportBtn").addEventListener("click", exportCsv);
  document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeDrill(); });
}

initControls();
loadWork("Nicomachean_Ethics");
</script>
</body>
</html>
