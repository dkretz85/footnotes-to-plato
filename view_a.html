<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Footnotes to Plato — which works get attention</title>
<link rel="stylesheet" href="filterbar.css">
<link rel="stylesheet" href="series.css">
<style>
  :root{
    --paper:#f7f8fb; --ink:#1c2230; --ink-soft:#5b6478; --rule:#d7dced;
    --lav:#8b86c9; --lav-deep:#5a5497;
    /* Plato = indigo family */
    --p-floor:#5a5497; --p-band:#8f8ad0; --p-fade:#c4c0e8;
    /* Aristotle = brighter green-teal family */
    --a-floor:#1f9e8a; --a-band:#5fc4ac; --a-fade:#b6e6d6;
    --uncertain:#b06a3a; --uncertain-soft:#e7d3c4;
    --shadow:0 1px 2px rgba(28,34,48,.06),0 4px 16px rgba(28,34,48,.06);
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Georgia,serif;
    --sans:"Inter","Helvetica Neue",Arial,system-ui,sans-serif;
    --mono:"SF Mono",ui-monospace,"Cascadia Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--paper); color:var(--ink); font-family:var(--sans); line-height:1.5;
    -webkit-font-smoothing:antialiased;}
  .wrap{max-width:1060px; margin:0 auto; padding:32px 28px 96px}

  header.mast{border-bottom:2px solid var(--ink); padding-bottom:14px; margin-bottom:8px}
  .mast .kicker{font-family:var(--mono); font-size:11px; letter-spacing:.18em; text-transform:uppercase;
    color:var(--lav-deep); margin-bottom:6px;}
  .mast h1{font-family:var(--serif); font-weight:600; font-size:44px; letter-spacing:.01em; margin:0 0 3px}
  .mast .sub{font-family:var(--serif); font-style:italic; color:var(--ink-soft); font-size:15px}

  .intro{font-size:14px; color:var(--ink-soft); max-width:76ch; margin:18px 0 6px}

  /* legend explaining the three bar parts + author hues */
  .barkey{display:flex; gap:20px; flex-wrap:wrap; align-items:center; margin:16px 0 4px;
    font-size:12.5px; color:var(--ink-soft);}
  .barkey .k{display:flex; align-items:center; gap:7px}
  .barkey .sw{width:24px; height:13px; border-radius:2px; flex:none}
  .barkey .authk{display:flex; align-items:center; gap:6px; margin-left:2px}
  .authk .chip{width:13px; height:13px; border-radius:3px}
  .chip.plato{background:var(--p-floor)} .chip.aris{background:var(--a-floor)}
  .sw.floor{background:linear-gradient(90deg,var(--p-floor) 50%,var(--a-floor) 50%)}
  .sw.band{background:linear-gradient(90deg,var(--p-band) 50%,var(--a-band) 50%)}
  .sw.fade{background:linear-gradient(90deg,var(--p-floor),rgba(196,192,232,0))}

  .tier-sec{margin:30px 0 8px}
  .tier-h{display:flex; align-items:baseline; gap:12px; margin-bottom:4px}
  .tier-h h2{font-family:var(--serif); font-weight:600; font-size:22px; margin:0}
  .tier-h .tag{font-family:var(--mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase;
    padding:2px 8px; border-radius:5px;}
  .tag.trust{color:var(--lav-deep); background:#eef1fa; border:1px solid var(--rule)}
  .tag.unc{color:var(--uncertain); background:#faf1ea; border:1px solid var(--uncertain-soft)}
  .tier-note{font-size:13px; color:var(--ink-soft); max-width:78ch; margin:2px 0 14px}
  .tier-note b{color:var(--ink)}

  /* the bar rows */
  .rows{display:flex; flex-direction:column; gap:3px}
  .row{display:grid; grid-template-columns:150px 1fr 78px; align-items:center; gap:12px;
    padding:3px 6px; border-radius:6px; cursor:pointer;}
  .row:hover{background:#fff; box-shadow:var(--shadow)}
  .row .name{font-family:var(--serif); font-size:14.5px; text-align:right; color:var(--ink);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .bar-track{position:relative; height:20px; display:flex; align-items:center}
  .bar-floor{height:20px; border-radius:2px 0 0 2px; min-width:1px}
  .bar-band{height:20px}
  /* fade: FULL height, a single smooth wash of the author hue that dissolves to
     transparent — the gradient itself does the fade, no mask or arrow needed.   */
  .bar-fade{height:20px; border-radius:0 3px 3px 0; position:relative;}
  /* fade under an active filter: greyed, width unchanged, dashed edge to mark
     that it is deliberately NOT participating in the filter */
  .bar-fade.unfiltered{outline:1px dashed rgba(120,128,146,.35); outline-offset:-1px}
  .row .val{font-family:var(--mono); font-size:12px; color:var(--ink-soft); text-align:right}

  /* segmented controls used by the time-series panel */
  .seg{display:inline-flex; border:1px solid var(--rule); border-radius:7px; overflow:hidden;
    box-shadow:var(--shadow); background:#fff}
  .seg button{font-family:var(--sans); font-size:12.5px; color:var(--ink); background:#fff;
    border:0; padding:5px 11px; cursor:pointer}
  .seg button + button{border-left:1px solid var(--rule)}
  .seg button[aria-pressed="true"]{background:var(--lav); color:#fff}

  /* tooltip */
  .tooltip{position:fixed; z-index:30; pointer-events:none; background:var(--ink); color:#fff;
    font-size:12px; padding:8px 11px; border-radius:7px; opacity:0; transition:opacity .1s;
    font-family:var(--sans); max-width:280px; line-height:1.45;}
  .tooltip .tt-name{font-family:var(--serif); font-size:13.5px; margin-bottom:3px}
  .tooltip .tt-row{color:#c7cdf0}
  .tooltip .tt-col{color:var(--fade1); margin-top:4px; font-size:11px}
  .tooltip b{color:#fff}

  /* Finding 3 apparatus: small-n and localised under-resolution.
     Clay is reserved for uncertainty throughout, so both badges use it. */
  .badge{font-family:var(--mono); font-size:8.5px; letter-spacing:.09em;
    text-transform:uppercase; padding:1px 5px; border-radius:4px; margin-left:6px;
    vertical-align:middle; white-space:nowrap; font-weight:500;}
  .badge.sm{color:var(--uncertain); background:#faf1ea; border:1px solid var(--uncertain-soft)}
  .badge.bd{color:var(--uncertain); background:transparent; border:1px dashed var(--uncertain-soft)}
  /* small-n bars sit back visually: the number is real, the rate behind the
     tier is not well evidenced, so the bar should not compete for attention */
  .bar-track.faint{opacity:.62}
  .tooltip .tt-warn{color:var(--uncertain-soft); margin-top:5px; font-size:11px;
    border-top:1px solid rgba(255,255,255,.15); padding-top:4px; line-height:1.4}
  .tier-sub{font-size:12px; color:var(--ink-soft); max-width:78ch;
    margin:-8px 0 14px; padding-left:11px; border-left:2px solid var(--uncertain-soft);}
  .tier-sub b{color:var(--ink)}
  .footnote{font-size:12px; color:var(--ink-soft); max-width:80ch; margin:36px 0 0;
    padding-top:14px; border-top:1px solid var(--rule); line-height:1.55;}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header class="mast">
    <div class="kicker" data-copy="site.kicker"></div>
    <h1 data-copy="view_a.heading"></h1>
    <div class="sub" data-copy="view_a.subtitle"></div>
  </header>

  <p class="intro" data-copy="view_a.intro"></p>

  <div class="barkey">
    <div class="k"><span class="sw floor"></span> <span data-copy="view_a.legend.floor"></span></div>
    <div class="k"><span class="sw band"></span> <span data-copy="view_a.legend.band"></span></div>
    <div class="k"><span class="sw fade"></span> <span data-copy="view_a.legend.fade"></span></div>
    <div class="authk"><span class="chip plato"></span> Plato <span class="chip aris"></span> Aristotle</div>
  </div>

  <div id="filterbar"></div>
  <div class="fb-note" id="fbCaveat" style="display:none"></div>

  <section class="sc" id="sc">
    <div class="sc-head">
      <h2>Attention over time</h2>
      <div class="seg" id="scMode">
        <button data-mode="works" aria-pressed="true">Compare works</button>
        <button data-mode="field" aria-pressed="false">Philosophy vs classics</button>
      </div>
    </div>

    <div class="sc-controls" id="scWorksCtl">
      <div class="sc-picker">
        <label id="scPickerLabel">Add a work or group</label>
        <select id="scAdd"><option value="">Choose…</option></select>
      </div>
      <div class="sc-chips" id="scChips"></div>
    </div>

    <div class="sc-opts">
      <div class="seg" id="scScale">
        <button data-share="0" aria-pressed="true">Counts</button>
        <button data-share="1" aria-pressed="false">Share of year</button>
      </div>
      <div class="seg" id="scSmooth">
        <button data-w="1" aria-pressed="true">Raw</button>
        <button data-w="5" aria-pressed="false">5-yr average</button>
        <button data-w="11" aria-pressed="false">11-yr average</button>
      </div>
    </div>

    <div class="sc-warn" id="scWarn" style="display:none"></div>
    <div class="sc-scope" id="scScope" style="display:none"></div>
    <div class="sc-legend" id="scLegend"></div>
    <div class="sc-chart" id="scChart"></div>
    <div class="sc-foot" id="scFoot"></div>
  </section>

  <div id="tiers"></div>

  <p class="footnote" data-copy="view_a.footnote"></p>
</div>

<div class="tooltip" id="tooltip"></div>

<script src="filterbar.js"></script>
<script src="series.js"></script>
<script>
const $ = s=>document.querySelector(s);
// Where the generated JSON lives, RELATIVE TO THIS HTML FILE.
// Repo layout is: view_a.html at root, data in viewer_data/.
// build_site.py rewrites this to "/data/viewer/" when it publishes the page.
// Must end with a slash when non-empty.
const DATA_DIR = "viewer_data/";

let DATA=null, SCALE=1, FILTER=null, WGROUPS=null;
// mirrors --small-n-threshold in build_viewer_data.py; only used for display
const SMALL_N_LABEL = 100;

// Author/edition map baked in (68 works, ~1.4KB) so there is NOTHING external to
// fetch — no silent 404, no misplaced file, colours always correct on load.
// 'p' = Plato / Stephanus pagination (indigo); 'a' = Aristotle / Bekker (teal).
const EDITIONS = {"Magna_Moralia": "a", "Meno": "p", "De_Incessu_Animalium": "a", "Ion": "p", "Euthyphro": "p", "De_Generatione_Animalium": "a", "Hippias_Minor": "p", "De_Respiratione": "a", "Meteorology": "a", "Sophist": "p", "Prior_Analytics": "a", "De_Partibus_Animalium": "a", "Apology": "p", "Posterior_Analytics": "a", "Critias": "p", "Cratylus": "p", "Euthydemus": "p", "Lysis": "p", "Historia_Animalium": "a", "Menexenus": "p", "Parmenides": "p", "Hippias_Major": "p", "De_Insomniis": "a", "Alcibiades_2": "p", "Rival_Lovers": "p", "Nicomachean_Ethics": "a", "Metaphysics": "a", "De_Sensu": "a", "Rhetoric": "a", "Poetics": "a", "Hipparchus": "p", "Statesman": "p", "Topics": "a", "De_Divinatione_per_Somnum": "a", "Theages": "p", "Laches": "p", "De_Caelo": "a", "Clitophon": "p", "Crito": "p", "Philebus": "p", "Letters": "p", "De_Generatione_et_Corruptione": "a", "Alcibiades_1": "p", "Rhetorica_ad_Alexandrum": "a", "Charmides": "p", "Republic": "p", "Politics": "a", "De_Somno": "a", "De_Interpretatione": "a", "Gorgias": "p", "Eudemian_Ethics": "a", "De_Motu_Animalium": "a", "Symposium": "p", "De_Longitudine_Vitae": "a", "Phaedrus": "p", "Physics": "a", "Laws": "p", "Sophistical_Refutations": "a", "De_Juventute": "a", "Categories": "a", "De_Anima": "a", "Epinomis": "p", "Timaeus": "p", "De_Memoria": "a", "Minos": "p", "Phaedo": "p", "Protagoras": "p", "Theaetetus": "p"};

// ---- externalised prose ---------------------------------------------------
// NB: the filter caveat and the time-series panel's warnings are still authored
// inline below. Externalising them into copy.json is a deferred follow-up (the
// handoff sequences the prose refactor as a separate pass after the features
// are back and verified).
let COPY=null;
function t(path, vars){
  let v = path.split(".").reduce((o,k)=>(o||{})[k], COPY);
  if(typeof v!=="string") return "";
  if(vars) for(const k in vars) v = v.split("{"+k+"}").join(vars[k]);
  return v;
}
function applyCopy(){
  for(const el of document.querySelectorAll("[data-copy]")){
    const v=t(el.dataset.copy);
    if(v){ if(/_html$/.test(el.dataset.copy)) el.innerHTML=v; else el.textContent=v; }
  }
  document.title = t("view_a.page_title") || document.title;
}
function fatal(msg){
  document.body.innerHTML =
    '<div style="max-width:44ch;margin:18vh auto;font:15px/1.55 system-ui;color:#5b6478">'+
    '<b style="color:#b06a3a">Could not start.</b><br>'+msg+'</div>';
}

/* ---- filtering ------------------------------------------------------------
   `view_a.json` carries only all-time totals, so filtering needs the separate
   sparse matrix in `view_a_filter.json` (work -> journal -> year -> n). That
   file is ~430 KB, so it is fetched lazily: View A paints instantly from the
   summary, and the matrix arrives before the user can finish reading the
   legend. Until it lands the filter bar is disabled rather than wrong.

   IMPORTANT — the fade is NOT filtered. `unplaceable` is a whole-corpus
   quantity with no year or journal dimension, because a citation we could not
   attribute to a WORK cannot honestly be attributed to a year either. Scaling
   it alongside the floor would manufacture a per-work-per-year number the
   pipeline never computed. So under a filter the fade is held at its full
   width and greyed, and the tooltip says so.

   The metric toggle (Citations / Distinct articles) was retired: audit 2b made
   both surfaces distinct-article-per-locus, so the two labels named one
   quantity. Filtering therefore works on the citation floor only.            */
function filteredFloor(w){
  if(!isFiltered()) return w.floor;
  const m = FILTER[w.work];
  if(!m || !m.citations) return 0;
  const st = FilterBar.state;
  let n=0;
  for(const j in m.citations){
    if(!st.journals.has(j)) continue;
    const yrs=m.citations[j];
    for(const y in yrs){
      const yi=+y;
      if(yi>=st.y0 && yi<=st.y1) n+=yrs[y];
    }
  }
  return n;
}
function isFiltered(){ return !!(FILTER && window.FilterBar && !FilterBar.isDefault()); }

// Measured width of the bar column: grid is 150px name / 1fr track / 78px value,
// with a 12px gap either side of the track.
function trackWidth(){
  const wrap=document.querySelector(".wrap");
  const w=(wrap?wrap.clientWidth:1000)-56;      // minus .wrap padding
  return Math.max(180, w-150-78-24);
}

let _rz;
window.addEventListener("resize", ()=>{
  clearTimeout(_rz);
  _rz=setTimeout(()=>{ if(DATA) render(); },150);
});

Promise.all([
  fetch(DATA_DIR+'copy.json').then(r=>{ if(!r.ok) throw new Error("copy.json HTTP "+r.status); return r.json(); }),
  fetch(DATA_DIR+'view_a.json').then(r=>{ if(!r.ok) throw new Error("view_a.json HTTP "+r.status); return r.json(); })
]).then(([c,d])=>{
  COPY=c; DATA=d;
  applyCopy();
  render();
  mountFilter();
}).catch(err=>{
  console.error(err);
  fatal(String(err).indexOf("copy.json")>=0
    ? "The text file <code>copy.json</code> could not be loaded or is not valid JSON. "+
      "If you just edited it, check for a stray comma or quote."
    : "The data file <code>view_a.json</code> could not be loaded.");
});

function mountFilter(){
  Promise.all([
    fetch(DATA_DIR+'meta.json').then(r=>r.json()),
    fetch(DATA_DIR+'journal_groups.json').then(r=>r.json()).catch(()=>null)
  ]).then(([meta, groups])=>{
    FilterBar.mount($("#filterbar"), meta, ()=>{
      if(!FILTER && !FilterBar.isDefault()){
        // matrix not in yet: show progress instead of silently doing nothing
        showCaveat("Loading filter data…");
        return;
      }
      updateCaveat();
      render();
      if(FILTER) scRender();
    }, groups);
    // the heavy matrix arrives after the first paint
    Promise.all([
      fetch(DATA_DIR+'view_a_filter.json').then(r=>r.json()),
      fetch(DATA_DIR+'work_groups.json').then(r=>r.json()).catch(()=>null)
    ]).then(([m,wg])=>{
      FILTER=m; WGROUPS=wg; updateCaveat(); render(); scInit();
    }).catch(e=>{
      console.warn("view_a_filter.json unavailable", e);
      showCaveat("Filtering unavailable: view_a_filter.json could not be loaded. "+
                 "Bars show all-time totals. Re-run build_viewer_data.py to generate it.");
    });
  }).catch(e=>{
    console.warn("meta.json unavailable — filter bar disabled", e);
    $("#filterbar").innerHTML =
      `<div class="fb-note">Filter unavailable: meta.json could not be loaded.</div>`;
  });
}

function showCaveat(msg){
  const el=$("#fbCaveat"); el.style.display=""; el.innerHTML=msg;
}
function updateCaveat(){
  const el=$("#fbCaveat");
  if(!isFiltered()){ el.style.display="none"; return; }
  el.style.display="";
  el.innerHTML = `Bars show only citations matching the filter, and the works are
     re-ranked accordingly. The <b>grey tail</b> is <b>not filtered</b>: unplaceable
     citations couldn't be attributed to a work, so they can't honestly be
     attributed to a year or journal either. It stays at full width to show the
     ambiguity is still there — don't read it as a filtered quantity. The
     "reasonably sure" band is hidden while filtering for the same reason.`;
}

function authorOf(work){ return EDITIONS[work]==="a" ? "a" : "p"; } // default Plato
function authorName(work){ return EDITIONS[work]==="a" ? "Aristotle" : "Plato"; }

function render(){
  const host=$("#tiers");
  host.innerHTML="";
  // one shared linear scale across BOTH tiers so bar lengths are comparable.
  // Audit finding 5: the scale omitted band_extra, so band segments could overrun
  // the intended track. Scale on the full drawn length: floor + band + fade.
  //
  // Scale is pinned to UNFILTERED totals on purpose. If the track re-fitted to
  // the filtered maximum, narrowing a filter would make every bar grow, which
  // reads as "more citations" when it means the opposite. So a filter genuinely
  // shortens the bars rather than rescaling them.
  const maxTotal = Math.max(
    ...DATA.map(w=>w.floor + Math.max(0,(w.band||w.floor)-w.floor) + w.unplaceable), 1);
  // TRACK was hardcoded at 740px with no responsiveness, so bars overflowed the
  // grid column on narrow screens. Measure the actual middle column instead.
  SCALE = trackWidth() / maxTotal;

  for(const tier of ["trustworthy","uncertain"]){
    // sort by the CURRENT (possibly filtered) floor so filtering re-ranks the
    // works — that re-ranking is one of the more interesting things it reveals.
    const works = DATA.filter(w=>w.tier===tier)
                      .sort((a,b)=>filteredFloor(b)-filteredFloor(a));
    const sec=document.createElement("div"); sec.className="tier-sec";
    const head=document.createElement("div"); head.className="tier-h";
    const tagCls = tier==="trustworthy" ? "trust" : "unc";
    head.innerHTML =
      `<h2>${t("view_a.tiers."+tier+".heading")}</h2>`+
      `<span class="tag ${tagCls}">${t("view_a.tiers."+tier+".tag",{n:works.length})}</span>`;
    sec.appendChild(head);

    const note=document.createElement("div"); note.className="tier-note";
    note.innerHTML = t("view_a.tiers."+tier+".note_html");
    sec.appendChild(note);

    // Finding 3: name the small-n caveat where the tier claims confidence.
    if(tier==="trustworthy" && works.some(w=>w.small_n)){
      const sub=document.createElement("div"); sub.className="tier-sub";
      sub.innerHTML = t("view_a.smalln.note_html",{threshold: SMALL_N_LABEL});
      sec.appendChild(sub);
    }

    const rows=document.createElement("div"); rows.className="rows";
    for(const w of works) rows.appendChild(makeRow(w));
    sec.appendChild(rows);
    host.appendChild(sec);
  }
}

function makeRow(w){
  const row=document.createElement("div");
  row.className="row";
  const au = authorOf(w.work);                 // "p" or "a"
  const floorC = `var(--${au}-floor)`;
  const bandC  = `var(--${au}-band)`;
  // rgb of each author's floor hue, for a smooth fade-to-transparent
  const floorRGB = au==="a" ? "31,158,138" : "90,84,151";

  const filt   = isFiltered();
  const fl     = filteredFloor(w);
  const floorW = Math.max(1, fl*SCALE);
  // the band is a floor extension; under a filter we can't apportion it by year
  // (queued rows are excluded from the matrix by design), so it is suppressed
  // rather than guessed.
  const bandW  = filt ? 0 : Math.max(0, (w.band - w.floor)*SCALE);
  const fadeW  = Math.max(0, w.unplaceable*SCALE);

  // fade: ONE smooth wash from the author hue (semi-opaque) to fully transparent.
  // No hard steps — so it reads as "trailing into the unknown", never as more bar.
  // Under a filter it goes GREY at unchanged width: the ambiguity it represents
  // has no year dimension, so it is neither scaled nor hidden, just marked as
  // not participating in the filter.
  const fadeRGB = filt ? "120,128,146" : floorRGB;
  const fadeBg = `linear-gradient(90deg, rgba(${fadeRGB},${filt?0.30:0.55}) 0%, rgba(${fadeRGB},${filt?0.15:0.28}) 45%, rgba(${fadeRGB},0) 100%)`;

  const bands = w.collision_bands || [];
  const bandRanges = bands.map(b=>`${b.start}–${b.end}`).join(", ");
  const badges =
    (w.small_n ? `<span class="badge sm" title="${t("view_a.smalln.badge")}">${t("view_a.smalln.badge")}</span>` : "")+
    (bands.length ? `<span class="badge bd">${t("view_a.bands.badge")}</span>` : "");

  row.innerHTML =
    `<div class="name">${w.work.replace(/_/g," ")}${badges}</div>`+
    `<div class="bar-track${w.small_n?" faint":""}">`+
      `<div class="bar-floor" style="width:${floorW}px;background:${floorC}"></div>`+
      (bandW>0.5?`<div class="bar-band" style="width:${bandW}px;background:${bandC}"></div>`:"")+
      (fadeW>2?`<div class="bar-fade${filt?" unfiltered":""}" style="width:${Math.min(fadeW,trackWidth()*0.42)}px;background:${fadeBg}">`+
               `</div>`:"")+
    `</div>`+
    `<div class="val">${fl.toLocaleString()}</div>`;
  row._bandRanges = bandRanges;

  const fadeEl = row.querySelector(".bar-fade");
  if(fadeEl){ fadeEl.style.setProperty("--arrow", `rgba(${floorRGB},0.5)`); }

  row.addEventListener("mousemove", e=>showTip(e,w));
  row.addEventListener("mouseleave", hideTip);
  row.addEventListener("touchstart", e=>showTip(e.touches[0],w), {passive:true});
  row.addEventListener("touchend", hideTip);
  return row;
}

const tip=$("#tooltip");
function showTip(e,w){
  const filt = isFiltered();
  const fl = filteredFloor(w);
  // Audit finding 5: the total omitted band_extra, so "≈X if all belonged here"
  // was short by the whole band segment.
  const bandExtra = Math.max(0,(w.band||w.floor)-w.floor);
  const total = w.floor + bandExtra + w.unplaceable;
  let html = `<div class="tt-name">${w.work.replace(/_/g," ")}</div>`;
  const auth = authorName(w.work);
  if(auth) html += `<div class="tt-row" style="font-size:11px;margin-bottom:3px">${auth}</div>`;
  if(filt){
    html += `<div class="tt-row">in filter <b>${fl.toLocaleString()}</b> citations`+
            ` <span style="opacity:.7">of ${w.floor.toLocaleString()} total</span></div>`;
  } else {
    html += `<div class="tt-row">floor <b>${w.floor.toLocaleString()}</b> ${t("view_a.tooltip.floor_label")}`;
    if(bandExtra>0) html += ` · +${bandExtra.toLocaleString()} ${t("view_a.tooltip.band_label")}`;
    html += `</div>`;
  }
  if(w.unplaceable>0){
    html += `<div class="tt-row">+<b>${w.unplaceable.toLocaleString()}</b> ${t("view_a.tooltip.unplaceable_label")}`;
    if(filt){
      html += ` <span style="opacity:.7">(not filtered — this ambiguity has no year)</span></div>`;
    } else {
      html += ` <span style="opacity:.7">${t("view_a.tooltip.if_all_belonged",{total:Math.round(total).toLocaleString()})}</span></div>`;
    }
  }
  html += `<div class="tt-row" style="margin-top:3px">`+
    t("view_a.tooltip.rate_line",{
      pct: Math.round(w.resolution_rate*100),
      articles: w.distinct_articles.toLocaleString()
    })+`</div>`;
  if(w.collides_with && w.collides_with.length){
    html += `<div class="tt-col">`+t("view_a.tooltip.collides_with",{
      works: w.collides_with.slice(0,4).map(x=>x.replace(/_/g," ")).join(", ")
    })+`</div>`;
  }
  const bands = w.collision_bands || [];
  if(bands.length){
    html += `<div class="tt-warn">`+t("view_a.bands.tooltip",{
      ranges: bands.map(b=>`${b.start}–${b.end}`).join(", "),
      missing: (w.band_est_missing||0).toLocaleString()
    })+`</div>`;
  }
  if(w.small_n){
    html += `<div class="tt-warn">`+t("view_a.legend.smalln")+`</div>`;
  }
  tip.innerHTML=html;
  tip.style.opacity="1";
  // keep tooltip on-screen
  const x=Math.min(e.clientX+14, window.innerWidth-296);
  tip.style.left=x+"px"; tip.style.top=(e.clientY+14)+"px";
}
function hideTip(){ tip.style.opacity="0"; }

/* ===== series comparison =================================================
   Time-series panel. Uses series.js (Series.*) and the same view_a_filter.json
   matrix as the bars. Metric is always the citation floor (see filteredFloor).
   Prose here is authored inline, pending the copy.json prose pass.           */
let SC_SEL=[], SC_MODE="works", SC_SHARE=false, SC_SMOOTH=1;
const SC_METRIC="count";

function scInit(){
  if(!window.Series){
    // series.js missing: hide the panel rather than throwing and taking the
    // bar chart down with it
    const el=$("#sc"); if(el) el.style.display="none";
    console.warn("series.js not loaded — time-series panel disabled");
    return;
  }
  const sel=$("#scAdd");
  // groups first (they're the interesting selections), then individual works
  if(WGROUPS){
    const og=document.createElement("optgroup"); og.label="Groups";
    for(const k in WGROUPS.groups){
      const g=WGROUPS.groups[k];
      const o=document.createElement("option");
      o.value="g:"+k;
      o.textContent=g.label + (g.basis==="contested" ? "  ⚠ contested" : "");
      og.appendChild(o);
    }
    sel.appendChild(og);
  }
  const ow=document.createElement("optgroup"); ow.label="Works";
  for(const w of DATA.map(d=>d.work).sort()){
    const o=document.createElement("option");
    o.value="w:"+w; o.textContent=w.replace(/_/g," ");
    ow.appendChild(o);
  }
  sel.appendChild(ow);

  sel.addEventListener("change",()=>{
    if(!sel.value) return;
    if(SC_SEL.length>=6){ sel.value=""; return; }   // palette + legibility cap
    if(!SC_SEL.includes(sel.value)) SC_SEL.push(sel.value);
    sel.value="";
    scRender();
  });
  $("#scMode").addEventListener("click",e=>{
    if(!e.target.dataset.mode) return;
    SC_MODE=e.target.dataset.mode;
    for(const b of $("#scMode").children) b.setAttribute("aria-pressed", b.dataset.mode===SC_MODE);
    scRender();
  });
  $("#scScale").addEventListener("click",e=>{
    if(!e.target.dataset.share) return;
    SC_SHARE=e.target.dataset.share==="1";
    for(const b of $("#scScale").children) b.setAttribute("aria-pressed",(b.dataset.share==="1")===SC_SHARE);
    scRender();
  });
  $("#scSmooth").addEventListener("click",e=>{
    if(!e.target.dataset.w) return;
    SC_SMOOTH=+e.target.dataset.w;
    for(const b of $("#scSmooth").children) b.setAttribute("aria-pressed",+b.dataset.w===SC_SMOOTH);
    scRender();
  });

  // a default that shows the feature working without asserting a thesis
  SC_SEL=["w:Republic","w:Nicomachean_Ethics"];
  scRender();
}

function scResolve(token){
  if(token.startsWith("w:")) {
    const w=token.slice(2);
    return {label:w.replace(/_/g," "), works:[w], basis:"work"};
  }
  const k=token.slice(2), g=WGROUPS && WGROUPS.groups[k];
  if(!g) return null;
  return {label:g.label, works:g.works, basis:g.basis, note:g.note};
}

function scRender(){
  if(!window.Series) return;
  // The picker stays visible in BOTH modes — hiding it in field mode was the
  // real reason the scope became invisible. Set the label here rather than in
  // the click handler so init and programmatic mode changes stay in sync.
  $("#scPickerLabel").textContent = SC_MODE==="field"
    ? "Restrict to work or group (optional)"
    : "Add a work or group";
  const host=$("#scChart");
  if(!FILTER){ host.innerHTML=`<div class="sc-empty">Loading time-series data…</div>`; return; }
  const st = window.FilterBar ? FilterBar.state : null;
  const opts = {metric:SC_METRIC, journals:st?st.journals:null,
                y0:st?st.y0:null, y1:st?st.y1:null};

  let lines=[], warn=[], footNotes=[], scopeBanner=null;

  if(SC_MODE==="field"){
    // one set of works (everything currently selected, or the whole corpus),
    // split by journal field — this is View B's comparison at corpus scale
    const G = window.FilterBar && FilterBar._groups;
    if(!G){ host.innerHTML=`<div class="sc-empty">No journal grouping available.</div>`; return; }
    const sel = SC_SEL.length ? SC_SEL : null;
    const works = sel
      ? [...new Set(sel.flatMap(t=>{const r=scResolve(t); return r?r.works:[];}))]
      : DATA.map(d=>d.work);
    const scope = sel ? SC_SEL.map(t=>scResolve(t).label).join(" + ") : "the whole corpus";
    /* Scope is the single most misreadable thing on this chart: the lines say
       "Philosophy" and "Classics" but they are always ABOUT some set of works,
       and if that set is still Republic+Laws from the previous mode the reader
       will happily interpret the curves as a claim about the whole corpus.
       So it goes in a banner above the chart, not a clause in the footnote. */
    scopeBanner = sel
      ? `Comparing how philosophy and classics journals cite <b>${scope}</b>.`
      : `Comparing philosophy and classics journals across <b>the whole corpus</b>
         — add a work or group above to narrow it.`;
    let i=0;
    for(const k in G.groups){
      const grp=G.groups[k];
      const jset=new Set(grp.journals.filter(j=>!st || st.journals.has(j)));
      const s=Series.seriesFor(FILTER, works, Object.assign({},opts,{journals:jset}));
      lines.push({label:grp.label, color:Series.COLORS[i++], series:s, _jset:jset});
    }
    if(!SC_SHARE){
      warn.push(`These journals differ in size — philosophy journals carry about
        1.5× the citations of the classics ones — so on raw counts the philosophy
        line sits higher almost everywhere regardless of interest.
        <b>Switch to “Share of year”</b> to compare where each field aims its attention.`);
    } else if(!sel){
      // Whole corpus / own-field denominator = 1.0 everywhere, by definition.
      // Two flat lines at 100% tell the reader nothing, so say what to do.
      warn.push(`Share mode divides each field by <b>its own</b> output, so with the
        whole corpus selected both lines are flat at 100% by definition. Add a work
        or group above to see what share of each field's attention it commands.`);
    }
  } else {
    if(!SC_SEL.length){
      host.innerHTML=`<div class="sc-empty">Add a work or group above to plot it.</div>`;
      $("#scFoot").innerHTML=""; $("#scWarn").style.display="none"; return;
    }
    let i=0;
    const tiers=new Set();
    for(const tok of SC_SEL){
      const r=scResolve(tok); if(!r) continue;
      const s=Series.seriesFor(FILTER, r.works, opts);
      /* A series' tier is a property of the WORKS in it, so a group spanning
         both tiers needs a weighted answer rather than a majority vote: the
         pooled resolution rate over the group's works, weighted by how many
         citations each contributes. A group that is 90% Republic and 10%
         Crito is mostly trustworthy and should not be dashed on Crito's
         account; one that is mostly short dialogues should be.             */
      let fl=0, qt=0, anyUnc=false, allUnc=true;
      for(const w of r.works){
        const rec=DATA.find(d=>d.work===w); if(!rec) continue;
        fl+=rec.floor; qt+=rec.queued_total;
        if(rec.tier==="uncertain") anyUnc=true; else allUnc=false;
        tiers.add(rec.tier);
      }
      const rate = (fl+qt) ? fl/(fl+qt) : 1;
      const tier = rate >= 0.80 ? "trustworthy" : "uncertain";
      lines.push({label:r.label, color:Series.COLORS[i++], series:s,
                  tier, rate, mixed:(anyUnc && !allUnc)});
      if(r.basis==="contested"){
        warn.push(`<b>${r.label}</b> is a contested grouping. ${r.note||""}`);
      }
      if(r.works.length>1) footNotes.push(`${r.label}: ${r.works.length} works.`);
    }
    const dashed = lines.filter(L=>L.tier==="uncertain");
    if(dashed.length){
      const names = dashed.map(L=>`<b>${L.label}</b> (${Math.round(L.rate*100)}%)`).join(", ");
      warn.push(`${names} ${dashed.length===1?"resolves":"resolve"} below 80%, so
        ${dashed.length===1?"that line is":"those lines are"} drawn dashed. The
        citations plotted are as accurate as any other — the tier reflects
        <i>coverage</i>, not correctness. But the missing mass is not evenly spread
        across years, so a rising dashed line may partly track improving
        resolvability rather than rising attention. Compare its shape, not its
        height against a solid line.`);
    }
    const mixed = lines.filter(L=>L.mixed);
    if(mixed.length){
      warn.push(`${mixed.map(L=>`<b>${L.label}</b>`).join(", ")} mixes works from
        both tiers, so its curve pools well-resolved and poorly-resolved works —
        movement may come from either.`);
    }
  }

  // share mode: divide by total corpus activity that year
  if(SC_SHARE){
    const denom = Series.corpusByYear(FILTER, opts);
    for(const L of lines){
      const out={};
      for(const y in L.series){
        const d = SC_MODE==="field" && L._jset
          ? Series.corpusByYear(FILTER, Object.assign({},opts,{journals:L._jset}))[y]
          : denom[y];
        if(d) out[y]=L.series[y]/d;
      }
      L.series=out;
    }
  }
  if(SC_SMOOTH>1) for(const L of lines) L.series=Series.smooth(L.series,SC_SMOOTH);

  Series.render(host, lines, {metric:SC_METRIC, share:SC_SHARE,
                              y0:opts.y0, y1:opts.y1});

  // legend lives OUTSIDE the chart container: the SVG is overflow:visible so a
  // tall first data point used to ride up into the chips.
  const leg=$("#scLegend"); leg.innerHTML="";
  for(const L of lines){
    const chip=document.createElement("span");
    chip.className="sc-lchip"+(L.tier==="uncertain"?" unc":"");
    const swatch = L.tier==="uncertain"
      ? `<i class="dash" style="--c:${L.color}"></i>`
      : `<i style="background:${L.color}"></i>`;
    const rate = L.rate!=null
      ? `<span class="sc-rate" title="share of this selection's detected citations that could be placed">${Math.round(L.rate*100)}% placed</span>`
      : "";
    chip.innerHTML = swatch + L.label + rate;
    if(SC_MODE==="works"){
      const tok=SC_SEL[lines.indexOf(L)];
      const x=document.createElement("button"); x.className="sc-x"; x.textContent="×";
      x.title="remove"; x.addEventListener("click",()=>{
        SC_SEL=SC_SEL.filter(t=>t!==tok); scRender();
      });
      chip.appendChild(x);
    }
    leg.appendChild(chip);
  }
  if(lines.some(L=>L.tier==="uncertain")){
    const k=document.createElement("span"); k.className="sc-dashkey";
    k.innerHTML=`dashed = under 80% of citations could be placed; the line is a
      partial floor, not a full count`;
    leg.appendChild(k);
  }
  // In field mode the legend names the two FIELDS, so the works in scope need
  // their own removable chips — otherwise a stale scope can only be seen, not
  // undone.
  if(SC_MODE==="field" && SC_SEL.length){
    const sep=document.createElement("span"); sep.className="sc-lsep";
    sep.textContent="scope:"; leg.appendChild(sep);
    for(const tok of SC_SEL.slice()){
      const r=scResolve(tok); if(!r) continue;
      const chip=document.createElement("span"); chip.className="sc-lchip scope";
      chip.textContent=r.label;
      const x=document.createElement("button"); x.className="sc-x"; x.textContent="×";
      x.title="remove from scope";
      x.addEventListener("click",()=>{ SC_SEL=SC_SEL.filter(t=>t!==tok); scRender(); });
      chip.appendChild(x);
      leg.appendChild(chip);
    }
  }

  const scEl=$("#scScope");
  if(scopeBanner){ scEl.style.display=""; scEl.innerHTML=scopeBanner; }
  else scEl.style.display="none";

  const wEl=$("#scWarn");
  if(warn.length){ wEl.style.display=""; wEl.innerHTML=warn.map(w=>`<div>${w}</div>`).join(""); }
  else wEl.style.display="none";

  const foot=[];
  foot.push(`Floor only: these curves count citations we could place with
    confidence. Unplaceable citations have no year and are absent here entirely.`);
  if(SC_SMOOTH>1) foot.push(`<b>Smoothed</b> with a ${SC_SMOOTH}-year centred average —
    the underlying yearly values are noisier, especially before 1950 when the
    corpus is thin.`);
  if(SC_SHARE) foot.push(`Share mode divides by all placed citations that year,
    so a flat line means a work held its ground as the literature grew.`);
  foot.push(...footNotes);
  $("#scFoot").innerHTML=foot.join(" ");
}
</script>
</body>
</html>
