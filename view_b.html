<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Footnotes to Plato — passage view</title>
<link rel="stylesheet" href="filterbar.css">
<style>
  /* ---- design tokens -------------------------------------------------------
     Subject: a scholarly instrument for ancient-philosophy researchers. The
     "world" is the printed critical edition — Stephanus/Bekker margin numbers
     running down a column of text. Palette: calm light-blue drifting to
     lavender (handoff); saturated colour RESERVED for the heat ramp and the
     uncertainty shading, so strong colour only ever means information.        */
  :root{
    --paper:#f7f8fb;          /* cool near-white, like laid text-paper        */
    --ink:#1c2230;            /* dark slate ink                                */
    --ink-soft:#5b6478;       /* secondary text                               */
    --rule:#d7dced;           /* hairline blue-grey                            */
    --lav:#8b86c9;            /* lavender — structural accent                  */
    --lav-deep:#5a5497;       /* deeper lavender for emphasis                  */
    /* heat ramp: pale blue -> lavender -> deep indigo (the ONLY strong colour)*/
    --h0:#eef1fa; --h1:#cfd8f4; --h2:#a7b3ea; --h3:#8388d6;
    --h4:#6a5fbf; --h5:#4e3f9c; --h6:#3a2a7d;
    --uncertain:#b06a3a;      /* warm clay — ONLY for the uncertainty apparatus*/
    --uncertain-soft:#e7d3c4;
    --shadow:0 1px 2px rgba(28,34,48,.06),0 4px 16px rgba(28,34,48,.06);
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Georgia,serif;
    --sans:"Inter","Helvetica Neue",Arial,system-ui,sans-serif;
    --mono:"SF Mono",ui-monospace,"Cascadia Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--paper); color:var(--ink);
    font-family:var(--sans); line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1060px; margin:0 auto; padding:32px 28px 96px}

  /* ---- masthead ----------------------------------------------------------- */
  header.mast{border-bottom:2px solid var(--ink); padding-bottom:14px; margin-bottom:8px}
  .mast h1{
    font-family:var(--serif); font-weight:600; font-size:44px; letter-spacing:.01em;
    margin:0 0 3px;
  }
  .mast .sub{font-family:var(--serif); font-style:italic; color:var(--ink-soft); font-size:15px}
  .mast .kicker{
    font-family:var(--mono); font-size:11px; letter-spacing:.18em; text-transform:uppercase;
    color:var(--lav-deep); margin-bottom:6px;
  }

  /* ---- controls ----------------------------------------------------------- */
  .controls{
    display:flex; flex-wrap:wrap; gap:18px 26px; align-items:flex-end;
    padding:18px 0 20px; border-bottom:1px solid var(--rule); margin-bottom:8px;
  }
  .ctl{display:flex; flex-direction:column; gap:5px}
  .ctl label{
    font-family:var(--mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--ink-soft);
  }
  select, .seg button{
    font-family:var(--sans); font-size:14px; color:var(--ink);
    background:#fff; border:1px solid var(--rule); border-radius:7px;
    padding:7px 11px; cursor:pointer;
  }
  select{min-width:230px; box-shadow:var(--shadow)}
  .seg{display:inline-flex; border:1px solid var(--rule); border-radius:7px; overflow:hidden; box-shadow:var(--shadow)}
  .seg button{border:0; border-radius:0; background:#fff; padding:7px 13px}
  .seg button + button{border-left:1px solid var(--rule)}
  .seg button[aria-pressed="true"]{background:var(--lav); color:#fff}

  /* ---- tier banner -------------------------------------------------------- */
  .tier{
    display:flex; gap:12px; align-items:flex-start;
    border-radius:9px; padding:12px 15px; margin:18px 0 10px; font-size:13.5px;
  }
  .tier .dot{width:10px; height:10px; border-radius:50%; margin-top:5px; flex:none}
  .tier.trustworthy{background:#eef1fa; border:1px solid var(--rule)}
  .tier.trustworthy .dot{background:var(--h4)}
  .tier.uncertain{background:#faf1ea; border:1px solid var(--uncertain-soft)}
  .tier.uncertain .dot{background:var(--uncertain)}
  .tier b{font-weight:600}
  .tier .label{
    font-family:var(--mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase;
  }
  .tier.trustworthy .label{color:var(--lav-deep)}
  .tier.uncertain .label{color:var(--uncertain)}

  /* ---- profile ------------------------------------------------------------ */
  .profile-head{display:flex; justify-content:space-between; align-items:baseline; margin:26px 0 4px}
  .profile-head h2{font-family:var(--serif); font-weight:600; font-size:24px; margin:0}
  .profile-head .meta{font-size:13px; color:var(--ink-soft)}
  .legend{display:flex; align-items:center; gap:10px; font-size:12px; color:var(--ink-soft); margin:10px 0 2px}
  .ramp{display:flex; height:11px; width:150px; border-radius:3px; overflow:hidden; border:1px solid var(--rule)}
  .ramp i{flex:1}
  .viewlabel{
    font-family:var(--mono); font-size:10px; letter-spacing:.15em; text-transform:uppercase;
    color:var(--lav-deep); margin:26px 0 8px;
  }

  /* ---- BAR CHART (magnitude view, section grain) -------------------------- */
  .chart{position:relative; margin:6px 0 4px}
  .chart svg{display:block; width:100%; overflow:visible}
  .bar{cursor:pointer}
  .bar:hover{outline:2px solid var(--lav)}
  .axis-line{stroke:var(--ink); stroke-width:1.4}
  .grid-line{stroke:var(--rule); stroke-width:1}
  .ytick{font-family:var(--mono); font-size:10px; fill:var(--ink-soft)}
  .ylabel{font-family:var(--mono); font-size:10px; letter-spacing:.12em; text-transform:uppercase; fill:var(--ink-soft)}
  .bookdiv{stroke:var(--rule); stroke-width:1; stroke-dasharray:2 3}
  .booktag{font-family:var(--serif); font-size:13px; fill:var(--lav-deep); font-weight:600}
  .booktag.common{fill:var(--uncertain)}

  /* ---- HEATMAP GRID (map view, line-band grain) --------------------------- */
  .heatgrid{display:grid; grid-template-columns:repeat(5,1fr); gap:20px 22px; margin-top:8px}
  .heatgrid.single{grid-template-columns:1fr}
  .book-label{
    font-family:var(--serif); font-size:14px; color:var(--lav-deep); font-weight:600;
    display:flex; align-items:center; gap:7px; margin-bottom:6px;
  }
  .book-label .common{
    font-family:var(--mono); font-size:8.5px; letter-spacing:.1em; color:var(--uncertain);
    border:1px solid var(--uncertain-soft); border-radius:4px; padding:1px 4px; text-transform:uppercase;
  }
  .strip{display:flex; flex-wrap:wrap; gap:7px 5px; align-items:flex-start}
  .pgcol{display:flex; flex-direction:column; align-items:center; gap:2px}
  .pgcol .sections{display:flex; flex-direction:column; gap:1px}
  .seccol{display:flex; gap:1px}          /* a-column and b-column side by side */
  .bandstack{display:flex; flex-direction:column; gap:1px}
  .cell{
    position:relative; width:11px; height:11px; border-radius:2px; cursor:pointer;
    border:1px solid rgba(28,34,48,.06); transition:transform .08s, box-shadow .08s;
  }
  .cell:hover{transform:scale(1.5); box-shadow:var(--shadow); outline:2px solid var(--lav); z-index:2}
  .cell.empty{background:transparent!important; border-style:dashed; border-color:rgba(28,34,48,.07); cursor:default}
  .cell.empty:hover{transform:none; outline:none; box-shadow:none}
  .pgcol .pnum{
    font-family:var(--mono); font-size:8px; color:var(--ink-soft); margin-top:1px;
  }
  .pgcol.mark .pnum{color:var(--lav-deep); font-weight:600}
  .seclabel{font-family:var(--mono); font-size:7px; color:rgba(28,34,48,.4); text-align:center}

  /* ---- drill-in panel ----------------------------------------------------- */
  .drill{
    position:fixed; top:0; right:0; height:100vh; width:min(430px,92vw);
    background:#fff; border-left:1px solid var(--rule); box-shadow:-8px 0 30px rgba(28,34,48,.12);
    transform:translateX(100%); transition:transform .22s cubic-bezier(.4,0,.2,1);
    display:flex; flex-direction:column; z-index:20;
  }
  .drill.open{transform:translateX(0)}
  .drill-head{padding:20px 22px 14px; border-bottom:1px solid var(--rule)}
  .drill-head .loc{font-family:var(--serif); font-size:21px; font-weight:600}
  .drill-head .cnt{font-size:13px; color:var(--ink-soft); margin-top:2px}
  .drill-close{position:absolute; top:16px; right:18px; border:0; background:none; font-size:22px; cursor:pointer; color:var(--ink-soft); line-height:1}
  .drill-body{overflow-y:auto; padding:8px 0}
  .cite{padding:12px 22px; border-bottom:1px solid var(--rule); font-size:13.5px}
  .cite .t{font-family:var(--serif); color:var(--ink); line-height:1.35}
  .cite .a{color:var(--ink-soft); margin-top:3px}
  .cite .j{color:var(--lav-deep); font-size:12.5px; margin-top:3px}
  .cite a.doi{
    font-family:var(--mono); font-size:11.5px; color:var(--lav-deep);
    text-decoration:none; border-bottom:1px solid var(--rule);
  }
  .cite a.doi:hover{border-color:var(--lav)}
  .drill-foot{padding:14px 22px; border-top:1px solid var(--rule)}
  .btn{
    font-family:var(--sans); font-size:13.5px; font-weight:500; color:#fff;
    background:var(--lav-deep); border:0; border-radius:7px; padding:9px 15px; cursor:pointer; width:100%;
  }
  .btn:hover{background:var(--lav)}
  .scrim{position:fixed; inset:0; background:rgba(28,34,48,.18); opacity:0; pointer-events:none; transition:opacity .22s; z-index:15}
  .scrim.open{opacity:1; pointer-events:auto}

  .tooltip{
    position:fixed; z-index:30; pointer-events:none; background:var(--ink); color:#fff;
    font-size:12px; padding:6px 9px; border-radius:6px; opacity:0; transition:opacity .1s;
    font-family:var(--sans); white-space:nowrap;
  }
  .tooltip .tt-loc{font-family:var(--mono); font-size:11px; color:#c7cdf0}

  /* ---- field comparison ---------------------------------------------------
     Two CATEGORIES, so two distinct hues rather than the heat ramp: lavender
     (philosophy, the house colour) against a muted ochre-green (classics).
     Neither is the clay used for uncertainty, which must keep its meaning.  */
  .bar.cmp{cursor:pointer}
  .bar.cmp-a{fill:var(--lav-deep)}
  .bar.cmp-b{fill:#8a8f4a}
  .bar.cmp:hover{outline:2px solid var(--ink)}
  .cmp-side{
    font-family:var(--mono); font-size:9.5px; letter-spacing:.1em;
    text-transform:uppercase;
  }
  .cmp-side.cmp-a{fill:var(--lav-deep)}
  .cmp-side.cmp-b{fill:#8a8f4a}
  .cmp-cap{
    font-size:12px; color:var(--ink-soft); line-height:1.5; margin-top:10px;
    padding-top:9px; border-top:1px solid var(--rule); max-width:80ch;
  }
  .cmp-cap b{color:var(--ink)}
  .cmp-warn{color:var(--uncertain)}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header class="mast">
    <div class="kicker">Footnotes to Plato</div>
    <h1>Passage-level attention</h1>
    <div class="sub">Which passages of a work the scholarship actually cites</div>
  </header>

  <div class="controls">
    <div class="ctl">
      <label for="work">Work</label>
      <select id="work"></select>
    </div>
    <div class="ctl">
      <label>Intensity</label>
      <div class="seg" id="metric">
        <button data-metric="count" aria-pressed="true">Citations</button>
        <button data-metric="articles" aria-pressed="false">Distinct articles</button>
      </div>
    </div>
    <div class="ctl">
      <label>Compare fields</label>
      <div class="seg" id="cmp">
        <button data-cmp="off" aria-pressed="true">Off</button>
        <button data-cmp="on" aria-pressed="false">Philosophy vs classics</button>
      </div>
    </div>
  </div>

  <div id="filterbar"></div>
  <div class="fb-note" id="fbCaveat" style="display:none"></div>

  <div id="tier"></div>

  <div class="profile-head">
    <h2 id="workname"></h2>
    <div class="meta" id="workmeta"></div>
  </div>

  <div class="viewlabel" id="viewlabel-chart">Citation profile · by section</div>
  <div class="chart" id="chart"></div>

  <div class="viewlabel">Passage map · line-band detail</div>
  <div class="legend" id="legend">
    <span>fewer</span>
    <div class="ramp"><i style="background:var(--h0)"></i><i style="background:var(--h1)"></i><i style="background:var(--h2)"></i><i style="background:var(--h3)"></i><i style="background:var(--h4)"></i><i style="background:var(--h5)"></i><i style="background:var(--h6)"></i></div>
    <span>more citations per section</span>
  </div>
  <div id="heatgrid" class="heatgrid"></div>
</div>

<div class="scrim" id="scrim"></div>
<aside class="drill" id="drill">
  <div class="drill-head">
    <button class="drill-close" id="drillClose">×</button>
    <div class="loc" id="drillLoc"></div>
    <div class="cnt" id="drillCnt"></div>
  </div>
  <div class="drill-body" id="drillBody"></div>
  <div class="drill-foot">
    <button class="btn" id="exportBtn">Export these citations (.csv)</button>
  </div>
</aside>

<div class="tooltip" id="tooltip"></div>

<script src="filterbar.js"></script>
<script>
// ---- available works ------------------------------------------------------
// Built from works_index.json, which the aggregator writes alongside the
// per-work files. Previously this was a hardcoded two-entry map, which meant
// the selector silently showed only whatever sample data happened to be
// present. Now every work the aggregator produced is offered.
let WORKS = [];                 // [{work, file, tier, citations, faceted}, ...]
const FILES = {};               // work id -> path, populated from WORKS
// textual book order (common books sit in their NE place; string sort won't do)
const BOOK_ORDER = ["I","II","III","IV","V*","VI*","VII*","VIII","IX","X",
                    "Α","α","Β","Γ","Δ","Ε","Ζ","Η","Θ","Ι","Κ","Λ","Μ","Ν",
                    "XI","XII"];
const SECTIONS = ["a","b","c","d","e"];

let current = null;       // loaded work json
let metric = "count";     // count | articles
let compare = false;      // field-comparison mode (philosophy vs classics)

const $ = s => document.querySelector(s);

function stripTags(s){ return (s||"").replace(/<[^>]+>/g," ").replace(/\s+/g," ").trim(); }

// heat ramp: map a value in [0,max] to one of 7 buckets
const RAMP = ["--h0","--h1","--h2","--h3","--h4","--h5","--h6"];
function heatVar(v, max){
  if(v<=0) return "--h0";
  // perceptual-ish: sqrt so mid values aren't all washed out
  const t = Math.sqrt(v)/Math.sqrt(max);
  const i = Math.min(RAMP.length-1, Math.max(1, Math.round(t*(RAMP.length-1))));
  return RAMP[i];
}
function isHot(v,max){ return v>0 && Math.sqrt(v)/Math.sqrt(max) > 0.55; }

async function loadWork(id){
  const path = FILES[id];
  if(!path){ console.warn("no data file for", id); return; }
  const res = await fetch(path);
  if(!res.ok){
    $("#chart").innerHTML =
      `<div class="fb-empty">Could not load data for ${id.replace(/_/g," ")}.</div>`;
    return;
  }
  current = await res.json();
  render();
}

function cellValue(cell){
  // journal selection is handled upstream by the filter bar (activeCells()
  // rebuilds from the surviving dots), so a cell is already scoped correctly.
  return metric==="articles" ? cell.articles : cell.count;
}

/* ---- filtered view of the work -------------------------------------------
   The shipped `cells` array carries by_journal but NO year breakdown, so as
   soon as a year window is set we must rebuild section cells from `dots`
   (which carry journal + year per citation). When no filter is active we use
   the precomputed cells verbatim — they're identical and cost nothing.
   `activeCells()` is the single source both the chart and the head read.     */
let _fCache=null, _fCacheKey="";
function filterKey(){
  if(!window.FilterBar || FilterBar.isDefault()) return "ALL";
  const s=FilterBar.state;
  return [...s.journals].sort().join(",")+"|"+s.y0+"-"+s.y1;
}
function activeDots(){
  if(!current) return [];
  if(!window.FilterBar || FilterBar.isDefault()) return current.dots;
  return current.dots.filter(d=>FilterBar.matches(d));
}
function activeCells(){
  if(!current) return [];
  const key = current.work+"|"+filterKey();
  if(_fCache && _fCacheKey===key) return _fCache;
  if(!window.FilterBar || FilterBar.isDefault()){
    _fCache=current.cells; _fCacheKey=key; return _fCache;
  }
  // rebuild section-grain cells from the surviving dots
  const map=new Map();
  for(const d of activeDots()){
    const k=`${d.book}|${d.page}|${d.section}`;
    let e=map.get(k);
    if(!e){ e={book:d.book, page:d.page, section:d.section, count:0,
                articles:0, by_journal:{}, _iids:new Set()}; map.set(k,e); }
    e.count++;
    e.by_journal[d.journal]=(e.by_journal[d.journal]||0)+1;
    if(d.iid) e._iids.add(d.iid);
  }
  const out=[];
  for(const e of map.values()){ e.articles=e._iids.size; delete e._iids; out.push(e); }
  _fCache=out; _fCacheKey=key;
  return out;
}

function render(){
  renderTier();
  renderHead();
  const empty = activeCells().length===0;
  $("#chart").innerHTML = "";
  $("#heatgrid").innerHTML = "";
  if(empty){
    // a filter that excludes everything: say so plainly rather than drawing
    // an empty axis, which reads as "this work is never cited".
    $("#chart").innerHTML =
      `<div class="fb-empty">No citations of this work match the current filter.<br>
       Widen the year range or re-enable journals.</div>`;
    return;
  }
  if(compare){
    renderCompare();
    // the heatmap stays pooled: a diverging line-band grid would be unreadable
    $("#heatgrid").innerHTML =
      `<div class="fb-empty">Passage map is hidden while comparing fields.
       Switch comparison off to see the line-band detail.</div>`;
    $("#viewlabel-chart").textContent = "Field comparison · by section";
    $("#legend").style.display = "none";
    return;
  }
  $("#viewlabel-chart").textContent = "Citation profile · by section";
  $("#legend").style.display = "";
  renderChart();
  renderHeatgrid();
}

function renderTier(){
  const t = current.tier;
  const el = $("#tier");
  if(t==="trustworthy"){
    el.className = "tier trustworthy";
    el.innerHTML = `<span class="dot"></span><div>
      <div class="label">Trustworthy tier · publication grade</div>
      At least 80% of this work's detected citations resolve to a specific passage.
      The profile below is a reliable picture of where attention falls: you can
      compare section heights within this work and cite them with confidence.</div>`;
  } else {
    el.className = "tier uncertain";
    el.innerHTML = `<span class="dot"></span><div>
      <div class="label">Uncertain tier · read with care</div>
      Fewer than 80% of this work's detected citations could be pinned to a
      specific passage — its page-numbers collide with other works, so much of
      its citation traffic is unplaceable. <b>What you see is a floor, not the
      full picture.</b> A short bar here means "we couldn't place these," not
      "few cite this." Trust the <i>shape</i> of what resolved; don't read the
      absolute heights as complete, and don't compare heights against
      trustworthy-tier works.</div>`;
  }
}

function renderHead(){
  const name = current.work.replace(/_/g," ");
  $("#workname").textContent = name;
  const cells = activeCells();
  const totalCites = cells.reduce((a,c)=>a+c.count,0);
  const pages = new Set(cells.map(c=>c.page)).size;
  const filtered = window.FilterBar && !FilterBar.isDefault();
  const allCites = current.cells.reduce((a,c)=>a+c.count,0);
  $("#workmeta").textContent =
    (filtered
      ? `${totalCites.toLocaleString()} of ${allCites.toLocaleString()} placed citations`
      : `${totalCites.toLocaleString()} placed citations`)
    + ` · ${cells.length} sections · ${pages} pages`
    + (current.faceted ? " · book-faceted" : "");

  /* Filtering has to be computed from `dots`, because `cells` carry no year
     dimension. But dots are deduped by iid+locus while cells.count is not, so
     the two disagree on the CITATIONS metric by ~20%. The DISTINCT-ARTICLES
     metric is exact either way (cells.articles == distinct iid+locus in dots).
     Rather than let the y-axis quietly shrink, say what's happening.
     Proper fix belongs in build_viewer_data.py — see the aggregator patch.   */
  const note = $("#fbCaveat");
  if(filtered && metric!=="articles"){
    note.style.display="";
    note.innerHTML =
      `Filtered citation counts are computed from the per-citation records, which are
       deduplicated by article-and-passage. They run about 15–20% below the unfiltered
       totals for that reason — the difference is duplicate mentions of the same passage
       within one article, not citations removed by your filter. <b>Switch to
       “Distinct articles” for a measure that is exact under filtering.</b>`;
  } else if(note){ note.style.display="none"; }
}

function orderedBooks(){
  const present = [...new Set(activeCells().map(c=>c.book))];
  return present.sort((a,b)=>{
    const ia=BOOK_ORDER.indexOf(a), ib=BOOK_ORDER.indexOf(b);
    return (ia<0?999:ia)-(ib<0?999:ib);
  });
}

// section-grain sequence across all books, in reading order, for the bar chart
function sectionSequence(){
  const books = orderedBooks();
  const seq = [];
  for(const book of books){
    const cells = activeCells()
      .filter(c=>c.book===book)
      .sort((a,b)=> a.page-b.page || SECTIONS.indexOf(a.section)-SECTIONS.indexOf(b.section));
    for(const c of cells) seq.push({cell:c, book});
  }
  return {seq, books};
}

// ---- BAR CHART (section grain, magnitude view) ----------------------------
function renderChart(){
  const host = $("#chart");
  host.innerHTML = "";
  const {seq, books} = sectionSequence();
  if(!seq.length) return;

  let max=0; for(const s of seq){ const v=cellValue(s.cell); if(v>max)max=v; }
  max = Math.max(max,1);

  const W = host.clientWidth || 1000;
  const H = 300;                       // generous height
  const padL = 46, padR = 12, padT = 14, padB = 40;
  const plotW = W - padL - padR;
  const plotH = H - padT - padB;
  const n = seq.length;
  const slot = plotW / n;
  const bw = Math.max(1.5, slot*0.82);
  const metricName = metric==="articles" ? "distinct articles" : "citations";

  const NS="http://www.w3.org/2000/svg";
  const svg = document.createElementNS(NS,"svg");
  svg.setAttribute("viewBox",`0 0 ${W} ${H}`);
  svg.setAttribute("height",H);

  // y grid + ticks (nice round numbers)
  const ticks = niceTicks(max, 4);
  for(const t of ticks){
    const y = padT + plotH - (t/max)*plotH;
    const gl=document.createElementNS(NS,"line");
    gl.setAttribute("class","grid-line");
    gl.setAttribute("x1",padL); gl.setAttribute("x2",W-padR);
    gl.setAttribute("y1",y); gl.setAttribute("y2",y);
    svg.appendChild(gl);
    const tx=document.createElementNS(NS,"text");
    tx.setAttribute("class","ytick");
    tx.setAttribute("x",padL-7); tx.setAttribute("y",y+3);
    tx.setAttribute("text-anchor","end"); tx.textContent=t;
    svg.appendChild(tx);
  }
  // y axis label
  const yl=document.createElementNS(NS,"text");
  yl.setAttribute("class","ylabel");
  yl.setAttribute("transform",`rotate(-90)`);
  yl.setAttribute("x",-(padT+plotH/2)); yl.setAttribute("y",13);
  yl.setAttribute("text-anchor","middle"); yl.textContent=metricName;
  svg.appendChild(yl);

  // baseline
  const base=document.createElementNS(NS,"line");
  base.setAttribute("class","axis-line");
  base.setAttribute("x1",padL); base.setAttribute("x2",W-padR);
  base.setAttribute("y1",padT+plotH); base.setAttribute("y2",padT+plotH);
  svg.appendChild(base);

  // bars, tracking book boundaries for x-axis dividers/labels
  let idx=0;
  const bookStartIdx={};
  for(const s of seq){
    if(bookStartIdx[s.book]===undefined) bookStartIdx[s.book]=idx;
    const v = cellValue(s.cell);
    const x = padL + idx*slot + (slot-bw)/2;
    const h = (v/max)*plotH;
    const y = padT + plotH - h;
    const bar=document.createElementNS(NS,"rect");
    bar.setAttribute("class","bar");
    bar.setAttribute("x",x); bar.setAttribute("y",y);
    bar.setAttribute("width",bw); bar.setAttribute("height",Math.max(0,h));
    bar.setAttribute("rx",Math.min(1.5,bw/2));
    bar.setAttribute("fill",`var(${heatVar(v,max)})`);
    const c=s.cell;
    bar.addEventListener("click",()=>openDrill(c));
    bar.addEventListener("mousemove",e=>showTipRaw(e,`${c.page}${c.section}`,v,c.articles));
    bar.addEventListener("mouseleave",hideTip);
    svg.appendChild(bar);
    idx++;
  }

  // book dividers + labels (only for faceted works with real books)
  if(current.faceted){
    for(const book of books){
      const startI = bookStartIdx[book];
      if(startI===undefined) continue;
      const x = padL + startI*slot;
      if(startI>0){
        const dv=document.createElementNS(NS,"line");
        dv.setAttribute("class","bookdiv");
        dv.setAttribute("x1",x); dv.setAttribute("x2",x);
        dv.setAttribute("y1",padT); dv.setAttribute("y2",padT+plotH+6);
        svg.appendChild(dv);
      }
      // label centered over this book's span
      const nextBook = books[books.indexOf(book)+1];
      const endI = nextBook!==undefined && bookStartIdx[nextBook]!==undefined
                   ? bookStartIdx[nextBook] : n;
      const cx = padL + ((startI+endI)/2)*slot;
      const tg=document.createElementNS(NS,"text");
      tg.setAttribute("class","booktag"+(book.endsWith("*")?" common":""));
      tg.setAttribute("x",cx); tg.setAttribute("y",padT+plotH+26);
      tg.setAttribute("text-anchor","middle");
      tg.textContent = book.replace("*","");
      svg.appendChild(tg);
    }
    // "Book" caption at far left of the axis row
    const cap=document.createElementNS(NS,"text");
    cap.setAttribute("class","ylabel");
    cap.setAttribute("x",padL-40); cap.setAttribute("y",padT+plotH+26);
    cap.textContent="Book";
    svg.appendChild(cap);
  }

  host.appendChild(svg);
}

/* ---- FIELD COMPARISON ----------------------------------------------------
   Plots two journal groups against each other across the work.

   The naive version — raw counts per group — mostly just restates that the
   philosophy journals are ~3x the volume of the classics ones, which we
   already know from the sidebar totals. The interesting question is where each
   field's attention falls *relative to its own output*. So each group is
   normalised to its own total: a bar shows that group's SHARE of its own
   citations landing on that section. Equal shares = both fields distribute
   attention the same way over the work, whatever their absolute sizes.

   Divergence is then share(A) - share(B) at each section, drawn as a
   diverging bar around a centre line.                                        */
function groupTotals(){
  const g = FilterBar._groups;
  if(!g) return null;
  const keys = Object.keys(g.groups);
  if(keys.length < 2) return null;
  return keys.map(k=>({
    key:k, label:g.groups[k].label,
    journals:new Set(g.groups[k].journals)
  }));
}

function buildCompare(){
  const groups = groupTotals();
  if(!groups) return null;
  const dots = activeDots();
  // section -> per-group counts (and distinct-article sets)
  const map = new Map();
  const tot = {}, totArt = {};
  for(const g of groups){ tot[g.key]=0; totArt[g.key]=new Set(); }

  for(const d of dots){
    let gk=null;
    for(const g of groups) if(g.journals.has(d.journal)){ gk=g.key; break; }
    if(!gk) continue;                       // unclassified journal: skipped
    const k=`${d.book}|${d.page}|${d.section}`;
    let e=map.get(k);
    if(!e){
      e={book:d.book,page:d.page,section:d.section,g:{},arts:{}};
      for(const g of groups){ e.g[g.key]=0; e.arts[g.key]=new Set(); }
      map.set(k,e);
    }
    e.g[gk]++; tot[gk]++;
    if(d.iid){ e.arts[gk].add(d.iid); totArt[gk].add(d.iid); }
  }
  const rows=[...map.values()];
  for(const e of rows){
    for(const g of groups) e['art_'+g.key]=e.arts[g.key].size;
    delete e.arts;
  }
  const totals={}; const totalsArt={};
  for(const g of groups){ totals[g.key]=tot[g.key]; totalsArt[g.key]=totArt[g.key].size; }
  return {groups, rows, totals, totalsArt};
}

function renderCompare(){
  const host = $("#chart");
  host.innerHTML = "";
  const C = buildCompare();
  if(!C){ host.innerHTML=`<div class="fb-empty">No journal grouping available.</div>`; return; }

  const [A,B] = C.groups;                       // exactly two groups supported
  const useArt = metric==="articles";
  const tA = (useArt?C.totalsArt:C.totals)[A.key];
  const tB = (useArt?C.totalsArt:C.totals)[B.key];
  if(!tA || !tB){
    host.innerHTML = `<div class="fb-empty">One field has no citations under the
      current filter — nothing to compare. Re-enable its journals.</div>`;
    return;
  }

  // order sections the same way the main chart does
  const {seq} = sectionSequence();
  const key = c=>`${c.book}|${c.page}|${c.section}`;
  const byKey = new Map(C.rows.map(r=>[key(r),r]));

  const items = seq.map(s=>{
    const r = byKey.get(key(s.cell));
    const a = r ? (useArt ? r['art_'+A.key] : r.g[A.key]) : 0;
    const b = r ? (useArt ? r['art_'+B.key] : r.g[B.key]) : 0;
    return {cell:s.cell, book:s.book, a, b,
            sa: a/tA, sb: b/tB, div: a/tA - b/tB};
  });

  let maxDiv = 0;
  for(const it of items) maxDiv = Math.max(maxDiv, Math.abs(it.div));
  maxDiv = Math.max(maxDiv, 1e-9);

  const W = host.clientWidth || 1000;
  const H = 300, padL = 52, padR = 12, padT = 16, padB = 40;
  const plotW = W-padL-padR, plotH = H-padT-padB;
  const mid = padT + plotH/2;
  const n = items.length, slot = plotW/n, bw = Math.max(1.5, slot*0.82);

  const NS="http://www.w3.org/2000/svg";
  const svg=document.createElementNS(NS,"svg");
  svg.setAttribute("viewBox",`0 0 ${W} ${H}`); svg.setAttribute("height",H);

  // centre line = equal share
  const base=document.createElementNS(NS,"line");
  base.setAttribute("class","axis-line");
  base.setAttribute("x1",padL); base.setAttribute("x2",W-padR);
  base.setAttribute("y1",mid); base.setAttribute("y2",mid);
  svg.appendChild(base);

  // side labels
  for(const [lab,yy,cls] of [[A.label+" cites more",padT+11,"cmp-a"],
                             [B.label+" cites more",padT+plotH-3,"cmp-b"]]){
    const t=document.createElementNS(NS,"text");
    t.setAttribute("class","cmp-side "+cls);
    t.setAttribute("x",padL-6); t.setAttribute("y",yy);
    t.setAttribute("text-anchor","end"); t.textContent=lab;
    svg.appendChild(t);
  }

  let idx=0;
  const bookStartIdx={};
  for(const it of items){
    if(bookStartIdx[it.book]===undefined) bookStartIdx[it.book]=idx;
    const h = Math.abs(it.div)/maxDiv * (plotH/2);
    const up = it.div >= 0;
    const x = padL + idx*slot + (slot-bw)/2;
    const y = up ? mid-h : mid;
    if(h>0.2){
      const bar=document.createElementNS(NS,"rect");
      bar.setAttribute("class","bar cmp "+(up?"cmp-a":"cmp-b"));
      bar.setAttribute("x",x); bar.setAttribute("y",y);
      bar.setAttribute("width",bw); bar.setAttribute("height",Math.max(0.6,h));
      bar.setAttribute("rx",Math.min(1.5,bw/2));
      const c=it.cell;
      bar.addEventListener("click",()=>openDrill(c));
      bar.addEventListener("mousemove",e=>showTipCmp(e,it,A,B,useArt));
      bar.addEventListener("mouseleave",hideTip);
      svg.appendChild(bar);
    }
    idx++;
  }

  // book dividers, same as the main chart
  if(current.faceted){
    const books = orderedBooks();
    for(const book of books){
      const si=bookStartIdx[book]; if(si===undefined) continue;
      if(si>0){
        const dv=document.createElementNS(NS,"line");
        dv.setAttribute("class","bookdiv");
        dv.setAttribute("x1",padL+si*slot); dv.setAttribute("x2",padL+si*slot);
        dv.setAttribute("y1",padT); dv.setAttribute("y2",padT+plotH+6);
        svg.appendChild(dv);
      }
      const nb=books[books.indexOf(book)+1];
      const ei = nb!==undefined && bookStartIdx[nb]!==undefined ? bookStartIdx[nb] : n;
      const tg=document.createElementNS(NS,"text");
      tg.setAttribute("class","booktag"+(book.endsWith("*")?" common":""));
      tg.setAttribute("x",padL+((si+ei)/2)*slot); tg.setAttribute("y",padT+plotH+26);
      tg.setAttribute("text-anchor","middle"); tg.textContent=book.replace("*","");
      svg.appendChild(tg);
    }
  }
  host.appendChild(svg);

  // caption: what the reader is looking at, plus the base rates
  const cap=document.createElement("div");
  cap.className="cmp-cap";
  const unit = useArt ? "articles" : "citations";
  cap.innerHTML =
    `Each field is normalised to its own output, so this shows where a field
     aims its attention, not how much it publishes.
     Base: <b>${tA.toLocaleString()}</b> ${A.label.toLowerCase()} ${unit} vs
     <b>${tB.toLocaleString()}</b> ${B.label.toLowerCase()} ${unit} for this work.
     Bars are the difference in each field's share of its own total.
     <span class="cmp-warn">Sections with only a handful of citations
     will swing wildly — read the tall bars, not the forest.</span>`;
  host.appendChild(cap);
}

function showTipCmp(e,it,A,B,useArt){
  const unit = useArt?"articles":"citations";
  const lead = it.div>=0 ? A : B;
  tip.innerHTML =
    `<span class="tt-loc">${it.cell.page}${it.cell.section}</span><br>`+
    `${A.label}: ${it.a} ${unit} (${(it.sa*100).toFixed(2)}% of field)<br>`+
    `${B.label}: ${it.b} ${unit} (${(it.sb*100).toFixed(2)}% of field)<br>`+
    `<b>${lead.label} leads</b> by ${(Math.abs(it.div)*100).toFixed(2)} pts`;
  tip.style.opacity="1";
  tip.style.left=Math.min(e.clientX+12, window.innerWidth-240)+"px";
  tip.style.top=(e.clientY+12)+"px";
}

function niceTicks(max, count){
  const raw = max/count;
  const mag = Math.pow(10, Math.floor(Math.log10(raw)));
  const norm = raw/mag;
  const step = (norm>=5?5:norm>=2?2:1)*mag;
  const ticks=[];
  for(let t=0;t<=max;t+=step) ticks.push(Math.round(t));
  if(ticks[ticks.length-1]<max) ticks.push(ticks[ticks.length-1]+step);
  return ticks;
}

// ---- HEATMAP GRID (line-band grain, map view) -----------------------------
function renderHeatgrid(){
  const host = $("#heatgrid");
  host.innerHTML = "";
  const books = orderedBooks();
  host.className = "heatgrid" + ((!current.faceted || books.length<=1) ? " single" : "");

  // colour scale from line-band values (built from dots)
  const bandCells = buildBandCells();   // book|page|sec|band -> {count,articles}
  let max=0; for(const v of bandCells.values()){ const val=metric==="articles"?v.articles:v.count; if(val>max)max=val; }
  max=Math.max(max,1);

  for(const book of books){
    const panel=document.createElement("div");
    if(current.faceted && book){
      const common=book.endsWith("*");
      panel.innerHTML=`<div class="book-label">Book ${book.replace("*","")}
        ${common?'<span class="common">common</span>':''}</div>`;
    }
    const strip=document.createElement("div"); strip.className="strip";
    const pages=[...new Set([...bandCells.keys()]
      .filter(k=>k.startsWith(book+"|")).map(k=>+k.split("|")[1]))].sort((a,b)=>a-b);

    for(const page of pages){
      const col=document.createElement("div");
      col.className="pgcol"+(page%5===0?" mark":"");
      const secrow=document.createElement("div"); secrow.className="seccol";
      // for Plato: a-e each as single band; for Bekker: a,b each split into 3 bands
      const secs = current.faceted && isBekker(current.work) ? ["a","b"] : SECTIONS;
      const nBands = (current.faceted && isBekker(current.work)) ? 3 : 1;
      for(const sec of secs){
        const stack=document.createElement("div"); stack.className="bandstack";
        for(let band=0; band<nBands; band++){
          const key=`${book}|${page}|${sec}|${band}`;
          const v=bandCells.get(key);
          const cell=document.createElement("div");
          if(v){
            const val=metric==="articles"?v.articles:v.count;
            cell.className="cell";
            cell.style.background=`var(${heatVar(val,max)})`;
            const bandLbl = nBands>1 ? `${sec}${['₁','₂','₃'][band]}` : sec;
            cell.addEventListener("click",()=>openDrillBand(book,page,sec,band,v));
            cell.addEventListener("mousemove",e=>showTipRaw(e,`${page}${bandLbl}`,val,v.articles));
            cell.addEventListener("mouseleave",hideTip);
          } else {
            cell.className="cell empty";
          }
          stack.appendChild(cell);
        }
        secrow.appendChild(stack);
      }
      col.appendChild(secrow);
      const pnum=document.createElement("div"); pnum.className="pnum"; pnum.textContent=page;
      col.appendChild(pnum);
      strip.appendChild(col);
    }
    panel.appendChild(strip);
    host.appendChild(panel);
  }
}

// build line-band cells from dots: book|page|sec|band -> {count, articles, iids}
let _bandCache=null, _bandCacheKey="";
function buildBandCells(){
  const ck = current.work+"|"+filterKey();
  if(_bandCache && _bandCacheKey===ck) return _bandCache;
  const map=new Map();
  const bekker = current.faceted && isBekker(current.work);
  for(const d of activeDots()){
    const band = bekker ? bandOf(d.line) : 0;
    const k=`${d.book}|${d.page}|${d.section}|${band}`;
    let e=map.get(k); if(!e){ e={count:0,articles:0,iids:new Set()}; map.set(k,e); }
    e.count++; if(d.iid) e.iids.add(d.iid);
  }
  for(const e of map.values()) e.articles=e.iids.size;
  _bandCache=map; _bandCacheKey=ck;
  return map;
}

const LINEBANDS=[[1,15],[16,30],[31,99]];
function bandOf(line){ if(line==null)return 0;
  for(let i=0;i<LINEBANDS.length;i++){ if(line>=LINEBANDS[i][0]&&line<=LINEBANDS[i][1])return i; }
  return 2; }
function isBekker(work){
  return ["Metaphysics","Nicomachean_Ethics","Eudemian_Ethics"].includes(work); }

function openDrillBand(book,page,sec,band,agg){
  // reuse the section drill but scope to this line-band
  const bekker = current.faceted && isBekker(current.work);
  const dots = activeDots().filter(d=>{
    if(d.book!==book||d.page!==page||d.section!==sec)return false;
    if(bekker) return bandOf(d.line)===band;
    return true;
  });
  const bandLbl = bekker ? `${page}${sec}${['₁','₂','₃'][band]}` : `${page}${sec}`;
  openDrillDots(dots, `${current.work.replace(/_/g," ")} ${bandLbl}`);
}

// ---- tooltip --------------------------------------------------------------
const tip = $("#tooltip");
function showTipRaw(e,locLabel,v,articles){
  const unit = metric==="articles" ? "articles" : "citations";
  tip.innerHTML = `<span class="tt-loc">${locLabel}</span> · ${v} ${unit}`
    + (articles!=null?` · ${articles} distinct`:"");
  tip.style.opacity="1";
  tip.style.left=(e.clientX+12)+"px";
  tip.style.top=(e.clientY+12)+"px";
}
function hideTip(){ tip.style.opacity="0"; }

// ---- drill-in -------------------------------------------------------------
function openDrill(cell){
  // section-grain drill (from a bar): all dots at this book/page/section
  const dots = activeDots().filter(d =>
    d.page===cell.page && d.section===cell.section && d.book===cell.book);
  openDrillDots(dots, `${current.work.replace(/_/g," ")} ${cell.page}${cell.section}`);
}

function openDrillDots(dots, locLabel){
  $("#drillLoc").textContent = locLabel.replace(/\s(\d)/, " · $1");
  $("#drillCnt").textContent =
    `${dots.length} article${dots.length===1?"":"s"} cite this passage`;
  const body = $("#drillBody");
  body.innerHTML = "";
  dots = dots.slice().sort((a,b)=> (b.year||"").localeCompare(a.year||""));
  for(const d of dots){
    const el = document.createElement("div");
    el.className = "cite";
    const doi = d.doi ? `https://doi.org/${d.doi}` : null;
    el.innerHTML =
      `<div class="t">${stripTags(d.title)||"(untitled)"}</div>`+
      (d.author?`<div class="a">${stripTags(d.author)}</div>`:"")+
      `<div class="j">${d.journal||""} · ${d.year||""}`+
      (doi?` · <a class="doi" href="${doi}" target="_blank" rel="noopener">${d.doi}</a>`:"")+
      `</div>`;
    body.appendChild(el);
  }
  currentDrillDots = dots;
  currentDrillLoc = locLabel;
  $("#drill").classList.add("open");
  $("#scrim").classList.add("open");
}
let currentDrillDots=[], currentDrillLoc="";
function closeDrill(){ $("#drill").classList.remove("open"); $("#scrim").classList.remove("open"); }

// ---- export ---------------------------------------------------------------
function exportCsv(){
  const rows = [["work","locus","journal","year","author","title","doi"]];
  for(const d of currentDrillDots){
    rows.push([
      current.work, `${d.page}${d.section}`, d.journal||"", d.year||"",
      stripTags(d.author), stripTags(d.title),
      d.doi?`https://doi.org/${d.doi}`:""
    ]);
  }
  const csv = rows.map(r=>r.map(x=>{
    const s=String(x); return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;
  }).join(",")).join("\n");
  const blob = new Blob([csv],{type:"text/csv"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `${current.work}_${currentDrillLoc.replace(/[^\w]/g,"")}.csv`;
  a.click();
}

// ---- wire up --------------------------------------------------------------
function buildWorkSelector(){
  const sel = $("#work");
  sel.innerHTML = "";
  // Grouped by tier so the selector itself carries the distinction: a reader
  // choosing Crito should see, before the chart loads, that it sits in the
  // partial-coverage group. Within each group, most-cited first.
  for(const [tier,label] of [["trustworthy","Reliable coverage (80%+ placed)"],
                             ["uncertain","Partial coverage (under 80% placed)"]]){
    const items = WORKS.filter(w=>w.tier===tier)
                       .sort((a,b)=>b.citations-a.citations);
    if(!items.length) continue;
    const og = document.createElement("optgroup");
    og.label = label;
    for(const w of items){
      const o=document.createElement("option");
      o.value=w.work;
      o.textContent=`${w.work.replace(/_/g," ")}  (${w.citations.toLocaleString()})`;
      og.appendChild(o);
    }
    sel.appendChild(og);
  }
}

function initControls(){
  const sel = $("#work");
  sel.addEventListener("change", e=>loadWork(e.target.value));
  $("#metric").addEventListener("click", e=>{
    if(!e.target.dataset.metric) return;
    metric=e.target.dataset.metric;
    for(const b of $("#metric").children) b.setAttribute("aria-pressed", b.dataset.metric===metric);
    render();
  });
  $("#cmp").addEventListener("click", e=>{
    if(!e.target.dataset.cmp) return;
    compare = e.target.dataset.cmp==="on";
    for(const b of $("#cmp").children)
      b.setAttribute("aria-pressed", (b.dataset.cmp==="on")===compare);
    render();
  });
  $("#drillClose").addEventListener("click", closeDrill);
  $("#scrim").addEventListener("click", closeDrill);
  $("#exportBtn").addEventListener("click", exportCsv);
  document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeDrill(); });
}

initControls();

// Load the work index, the filter metadata and the journal grouping together,
// then populate the selector and open a default work. The index is what makes
// every work available rather than a hardcoded pair.
Promise.all([
  fetch('works_index.json').then(r=>r.json()),
  fetch('meta.json').then(r=>r.json()),
  // field grouping is optional: if it's missing the bar degrades to one column
  fetch('journal_groups.json').then(r=>r.json()).catch(()=>null)
]).then(([index, meta, groups])=>{
  WORKS = index;
  // works_index.json gives paths relative to the data directory; resolve them
  // against wherever works_index.json itself was fetched from, so this works
  // both standalone and when the site build re-hosts the viewer.
  const base = FILES.__base || "";
  for(const w of WORKS) FILES[w.work] = base + w.file;
  buildWorkSelector();

  FilterBar.mount($("#filterbar"), meta, ()=>{
    _fCache=null; _bandCache=null;   // filter changed: drop derived caches
    if(current) render();
  }, groups);

  // open the most-cited well-resolved work by default
  const first = WORKS.filter(w=>w.tier==="trustworthy")
                     .sort((a,b)=>b.citations-a.citations)[0] || WORKS[0];
  if(first){ $("#work").value = first.work; loadWork(first.work); }
}).catch(e=>{
  console.warn("viewer data unavailable", e);
  $("#filterbar").innerHTML =
    `<div class="fb-note">Could not load viewer data. If you are running this
     file directly from disk, serve it over HTTP instead — browsers block
     fetch() on file:// URLs.</div>`;
});
</script>
